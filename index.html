        <text x={206} y={248} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}

function applyGraphFilters(eps,f,mode){
  mode=mode||"all";
  // Build per-episode filter functions
  function matches(ep){
    var fns=[];
    if(f.sphere) fns.push(ep.spheres.indexOf(f.sphere)>=0);
    var isG=ep.type==="guest";
    if(f.types.length>0) fns.push(f.types.indexOf(ep.type)>=0);

function textScore(ep, words) {
  if (!words || words.length === 0) return 0;
  var score = 0;
  var searchable = [ep.guest||"",ep.title||"",ep.role||"",ep.quote||"",(ep.keywords||[]).join(" "),(ep.felder||[]).join(" ")].join(" ").toLowerCase();
  words.forEach(function(w){
    if(searchable.indexOf(w)>=0) score+=2;
    if((ep.guest||"").toLowerCase().indexOf(w)>=0) score+=3;
    if((ep.title||"").toLowerCase().indexOf(w)>=0) score+=2;
    if((ep.quote||"").toLowerCase().indexOf(w)>=0) score+=1;
    (ep.keywords||[]).forEach(function(k){if(k.toLowerCase().indexOf(w)>=0) score+=2;});
  });
  var allMatch=words.every(function(w){return searchable.indexOf(w)>=0;});
  if(allMatch&&words.length>1) score+=5;
  return score;
}

function buildFilterFns(vennList, sphere, felder, gender, generation, hemisphere, words) {
  var fns = [];
  // Each venn tag = one filter function
  vennList.forEach(function(v){
    fns.push({label:"venn:"+v, fn:function(e){return (e.vennFields||[]).indexOf(v)>=0;}});
  });
  if(sphere) fns.push({label:"sphere", fn:function(e){return e.spheres.indexOf(sphere)>=0;}});
  if(felder) fns.push({label:"felder", fn:function(e){return e.felder.indexOf(felder)>=0;}});
  if(gender) fns.push({label:"gender", fn:function(e){return e.gender===gender;}});
  if(generation) fns.push({label:"gen",  fn:function(e){return e.generation===generation;}});
  if(hemisphere) fns.push({label:"hem",  fn:function(e){return e.hemisphere===hemisphere;}});
  if(words&&words.length>0) fns.push({label:"text", fn:function(e){return textScore(e,words)>0;}});
  return fns;
}

function highlight(text, words) {
  if (!text || !words || words.length === 0) return text;
  var result = text;
  words.forEach(function(w) {
    if (w.length < 3) return;
    var re = new RegExp('(' + escReg(w) + ')', 'gi');
    result = result.replace(re, '§§$1§§');
  });
  var parts = result.split('§§');
  return parts.map(function(p, i) {
    var isMatch = i % 2 === 1;
    return isMatch
      ? <mark key={i} style={{background:"#f5e8c8",color:P.dark,borderRadius:2,padding:"0 1px"}}>{p}</mark>
      : p;
  });
}

function SmartSearch(props) {
  var [q, setQ]               = useState("");
  var [vennFilters, setVF]    = useState([]);
  var [sphereFilter, setSF]   = useState(null);
  var [felderFilter, setFF]   = useState(null);
  var [genderF, setGF]        = useState(null);
  var [genF, setGenF]         = useState(null);
  var [hemF, setHemF]         = useState(null);
  var [selected, setSel]      = useState(null);
  var [showMore, setShowMore] = useState(false);

  var fmode = props.filterMode || "all";
  var words = q.toLowerCase().trim().split(/\s+/).filter(function(w){return w.length>2;});
  var hasFilters = !!(q.trim() || vennFilters.length>0 || sphereFilter || felderFilter || genderF || genF || hemF);

  // Build one test-function per active filter
  var fns = [];
  vennFilters.forEach(function(v){ fns.push(function(e){return (e.vennFields||[]).indexOf(v)>=0;}); });
  if(sphereFilter) fns.push(function(e){return e.spheres.indexOf(sphereFilter)>=0;});
  if(felderFilter) fns.push(function(e){return e.felder.indexOf(felderFilter)>=0;});
  if(genderF)      fns.push(function(e){return e.gender===genderF;});
  if(genF)         fns.push(function(e){return e.generation===genF;});
  if(hemF)         fns.push(function(e){return e.hemisphere===hemF;});
  if(words.length>0) fns.push(function(e){return textScore(e,words)>0;});

  var results;
  if(!hasFilters) {
    results = EPISODES.map(function(ep){return{ep:ep,score:ep.num};})
      .sort(function(a,b){return b.score-a.score;});
  } else if(fmode==="all") {
    results = EPISODES
      .filter(function(ep){return fns.every(function(f){return f(ep);});})
      .map(function(ep){return{ep:ep,score:textScore(ep,words)};})
      .sort(function(a,b){return b.score-a.score;});
  } else if(fmode==="any") {
    results = EPISODES
      .filter(function(ep){return fns.some(function(f){return f(ep);});})
      .map(function(ep){
        var matched=fns.filter(function(f){return f(ep);}).length;
        return{ep:ep,score:matched*3+textScore(ep,words)};
      }).sort(function(a,b){return b.score-a.score;});
  } else {
    // score mode: all that match anything, sorted by # matches
    results = EPISODES
      .map(function(ep){
        var matched=fns.filter(function(f){return f(ep);}).length;
        return{ep:ep,score:matched*3+textScore(ep,words)};
      }).filter(function(r){return r.score>0;})
      .sort(function(a,b){return b.score-a.score;});
  }

      {FRAGMENT_TYPES.map(function(t){var act=activeType===t.id;return(
        <button key={t.id} onClick={function(){setActiveType(act?null:t.id);}}
          style={{background:act?t.color+"28":P.white,color:act?t.color:P.mid,border:"1px solid "+(act?t.color:P.creamDim),borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>
          {t.icon} {t.label}
        </button>);
      })}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
      {filtered.map(function(f){
        var ft=FRAGMENT_TYPES.find(function(t){return t.id===f.type;});
        return(<div key={f.id} style={{background:P.white,border:"1px solid "+P.creamDim,borderTop:"3px solid "+(ft?ft.color:P.teal),borderRadius:8,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:16}}>{ft?ft.icon:"📄"}</span>
            <span style={{color:ft?ft.color:P.teal,fontSize:10,background:(ft?ft.color:P.teal)+"18",padding:"2px 7px",borderRadius:10}}>{ft?ft.label:f.type}</span>
          </div>
          <div style={{color:P.dark,fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",marginBottom:5}}>{f.title}</div>
          <div style={{color:P.mid,fontSize:11,lineHeight:1.5}}>{f.desc}</div>
          {f.quote_en&&<div style={{color:P.mid,fontSize:11,fontStyle:"italic",marginTop:8,borderLeft:"2px solid "+(ft?ft.color:P.teal),paddingLeft:8}}>"{f.quote_en}"</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:8}}>{f.keywords.map(function(k){return <span key={k} style={{background:P.creamDim,color:P.mid,fontSize:9,padding:"2px 6px",borderRadius:8}}>{k}</span>;})}</div>
        </div>);
      })}
    </div>
    {FRAGMENTS.length===0&&<div style={{color:P.mid,fontSize:12,padding:20,textAlign:"center",background:P.tealPale,borderRadius:8,marginTop:10}}>
      💡 Fragmente werden automatisch aus Transkripten extrahiert wenn neue Einträge verarbeitet werden.
    </div>}
  </div>);
}

function App(){
  var [merkliste,setMerkliste]=useState([]);
  var [discoveries,setDiscoveries]=useState([]);
  var [pins,setPins]=useState([]);
  var [tab,setTab]=useState("kompass");
  var [sphere,setSphere]=useState(null);
  var [felder,setFelder]=useState(null);
  var [vennFilter,setVennFilter]=useState(null);
  var [filterMode,setFilterMode]=useState("all");
  var [selected,setSelected]=useState(null);
  var [search,setSearch]=useState("");
  var [navHistory,setNavHistory]=useState([]);
  var [gFilters,setGFilters]=useState(defaultFilters());
  var [resetKey,setResetKey]=useState(0);

  function handleGFilter(field,val){setGFilters(function(f){var n=Object.assign({},f);if(field==="sphere"){n.sphere=val;}else if(field==="alphaMode"){n.alphaMode=val;}else{n[field]=toggleArr(f[field]||[],val);}return n;});}
  function navigateTo(nt,ns){setNavHistory(function(h){return h.concat([{tab:tab,selected:selected}]);});setTab(nt);setSelected(ns||null);}
  function goBack(){if(navHistory.length===0)return;var p=navHistory[navHistory.length-1];setNavHistory(function(h){return h.slice(0,-1);});setTab(p.tab);setSelected(p.selected);}
  function handleNavEp(ep){navigateTo("kompass",ep);}
  async function toggleBookmark(ep){var id=epId(ep);await setMerkliste(function(p){return p.indexOf(id)>=0?p.filter(function(x){return x!==id;}):p.concat([id]);});}
  async function saveDiscovery(disc){await setDiscoveries(function(p){return p.concat([disc]);});}
  async function shareDiscovery(disc){var pin={id:String(Date.now()),authorName:"Anonym",title:disc.title,query:disc.query,response:disc.response,createdAt:new Date().toISOString()};await setPins(function(p){return p.concat([pin]);});navigateTo("community",null);}

  var _fns=[];
  if(sphere)_fns.push(function(e){return e.spheres.indexOf(sphere)>=0;});
  if(felder)_fns.push(function(e){return e.felder.indexOf(felder)>=0;});
  if(vennFilter)_fns.push(function(e){return e.vennFields&&e.vennFields.indexOf(vennFilter)>=0;});
  if(search.trim()){var _sq=search.toLowerCase();_fns.push(function(e){return (e.guest&&e.guest.toLowerCase().indexOf(_sq)>=0)||e.title.toLowerCase().indexOf(_sq)>=0||e.keywords.some(function(k){return k.toLowerCase().indexOf(_sq)>=0;})||(e.quote&&e.quote.toLowerCase().indexOf(_sq)>=0)||e.felder.some(function(f){return f.toLowerCase().indexOf(_sq)>=0;});});}
  var filtered=_fns.length===0?EPISODES:filterMode==="all"?EPISODES.filter(function(e){return _fns.every(function(f){return f(e);});}):filterMode==="any"?EPISODES.filter(function(e){return _fns.some(function(f){return f(e);});}):EPISODES.map(function(e){return{ep:e,s:_fns.filter(function(f){return f(e);}).length};}).filter(function(r){return r.s>0;}).sort(function(a,b){return b.s-a.s;}).map(function(r){return r.ep;});
  var gFiltered=applyGraphFilters(EPISODES,gFilters,filterMode);
  function selToggle(ep){setSelected(function(s){return s&&epId(s)===epId(ep)?null:ep;});}
  var TABS=[["kompass","🧭 Kompass"],["graph","🕸 Graph"],["suche","🔍 Suche"],["ki","🌿 KI-Kompass"],["smartsuche","🔎 Smart-Suche"],["glossar","📚 Glossar"],["merkliste","🔖 Merkliste"+(merkliste.length>0?" ("+merkliste.length+")":"")],["community","📌 Netzwerk"+(pins.length>0?" ("+pins.length+")":"")]];
  return(<div style={{background:P.cream,color:P.dark,minHeight:"100vh",fontFamily:"Georgia,serif",position:"relative"}}>
    <div style={{background:P.white,borderBottom:"2px solid rgba(58,158,140,0.12)",padding:"12px 20px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
        <button onClick={goBack} disabled={navHistory.length===0}
          style={{background:navHistory.length>0?P.tealPale:P.creamDim,color:navHistory.length>0?P.teal:P.light,border:"1px solid "+(navHistory.length>0?P.teal+"50":P.creamDim),borderRadius:6,padding:"4px 10px",fontSize:12,cursor:navHistory.length>0?"pointer":"default",fontFamily:"Georgia,serif",opacity:navHistory.length>0?1:0.4}}
          title={navHistory.length>0?"Zurück ("+navHistory.length+" Schritte)":"Kein Verlauf"}>
          ← Zurück{navHistory.length>1?" ("+navHistory.length+")":""}
        </button>
        <span style={{color:P.teal,fontSize:16,fontWeight:"bold"}}>🌱 Humus-Kompass</span>
        <span style={{color:P.light,fontSize:11}}>{EPISODES.length} Einträge</span>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",flexWrap:"wrap"}}>{TABS.map(function(t){return(<button key={t[0]} onClick={function(){setTab(t[0]);setNavHistory([]);}} style={{background:"transparent",color:tab===t[0]?P.teal:P.mid,border:"none",borderBottom:"2px solid "+(tab===t[0]?P.teal:"transparent"),padding:"7px 12px",cursor:"pointer",fontSize:11,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{t[1]}</button>);})}</div>
        <div style={{padding:"4px 8px"}}><FilterModeToggle mode={filterMode} onChange={setFilterMode}/></div>
      </div>
    </div>
    <div style={{padding:"18px 20px"}}>
      {tab==="kompass"&&(<div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:20,alignItems:"start"}}>
        <div style={{minWidth:300,maxWidth:620}}>
          <Compass activeSphere={sphere} activeFelder={felder} activeVennFilter={vennFilter}
            onSphere={function(id){setSphere(function(p){return p===id?null:id;});}}
            onFelder={function(f){setFelder(function(p){return p===f?null:f;});}}
            onVennFilter={function(id){setVennFilter(function(p){return p===id?null:id;});}}
            count={filtered.length}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            {(sphere||felder||vennFilter)?<div style={{color:P.mid,fontSize:11,padding:"4px 8px",background:P.white,borderRadius:4,border:"1px solid "+P.creamDim}}>Linse: {sphere&&<strong style={{color:sc(sphere)}}>{(SPHERES.find(function(s){return s.id===sphere;})||{}).iLabel}</strong>}{sphere&&felder&&" · "}{felder&&<strong style={{color:P.teal}}>{felder}</strong>}{(sphere||felder)&&vennFilter&&" · "}{vennFilter&&<strong style={{color:"#6a50a0"}}>⬡ {vennFilter}</strong>}</div>:<div/>}
            <FilterModeToggle mode={filterMode} onChange={setFilterMode}/>
          </div>
          <div style={{maxHeight:560,overflowY:"auto",paddingRight:4}}>
            {filtered.length===0?<div style={{color:P.light,fontSize:13}}>Keine Einträge.</div>:filtered.map(function(ep){return <EpCard key={epId(ep)} ep={ep} onClick={selToggle} active={selected&&epId(selected)===epId(ep)} bookmarked={merkliste.indexOf(epId(ep))>=0} onBookmark={toggleBookmark}/>;})}</div>
        </div>
        {selected&&(function(){
          var idx2=filtered.findIndex(function(e){return epId(e)===epId(selected);});
          return <div style={{gridColumn:"1 / -1"}}><DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+filtered.length:null}
            onPrev={idx2>0?function(){setSelected(filtered[idx2-1]);}:null}
            onNext={idx2<filtered.length-1?function(){setSelected(filtered[idx2+1]);}:null}/></div>;
        })()}
      </div>)}
      {tab==="graph"&&(<div style={{display:"grid",gridTemplateColumns:selected?"1fr 300px":"1fr",gap:20}}>
        <div>
          <GraphFilterPanel filters={gFilters} onChange={handleGFilter} filterMode={filterMode} onFilterMode={setFilterMode} onResetFilters={function(){setGFilters(defaultFilters());}} onResetLayout={function(){setResetKey(function(k){return k+1;});}}/>
          <div style={{color:P.light,fontSize:11,marginBottom:8}}>{gFiltered.length} von {EPISODES.length} Einträge sichtbar</div>
          <div style={{background:P.white,borderRadius:8,border:"1px solid "+P.creamDim,overflow:"hidden"}}>
            <Graph key={resetKey} eps={gFiltered.length>0?gFiltered:EPISODES} selected={selected} onSelect={selToggle}/>
          </div>
          <div style={{color:P.light,fontSize:10,marginTop:6,textAlign:"center"}}>Knoten ziehen → bleiben fixiert · ⟳ Layout für Reset</div>
        </div>
        {selected&&(function(){
          var src=gFiltered;
          var idx2=src.findIndex(function(e){return epId(e)===epId(selected);});
          return <DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+src.length:null}
            onPrev={idx2>0?function(){setSelected(src[idx2-1]);}:null}
            onNext={idx2<src.length-1?function(){setSelected(src[idx2+1]);}:null}/>;
        })()}
      </div>)}
      {tab==="suche"&&(<div style={{display:"grid",gridTemplateColumns:selected?"1fr 300px":"1fr",gap:20}}>
        <div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Person, Thema, Stichwort, Zitat…" style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:6,padding:"10px 14px",fontSize:13,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>{SPHERES.map(function(s){return <button key={s.id} onClick={function(){setSphere(function(p){return p===s.id?null:s.id;});}} style={{background:sphere===s.id?s.pale:"transparent",color:s.color,border:"1px solid "+s.color+"60",borderRadius:12,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>{s.iLabel.split(" ·")[0]}</button>;})}</div>
          <div style={{color:P.light,fontSize:11,margin:"8px 0 6px"}}>{filtered.length} Einträge</div>
          <div style={{maxHeight:520,overflowY:"auto"}}>{filtered.map(function(ep){return <EpCard key={epId(ep)} ep={ep} onClick={selToggle} active={selected&&epId(selected)===epId(ep)} bookmarked={merkliste.indexOf(epId(ep))>=0} onBookmark={toggleBookmark}/>;})}</div>
        </div>
        {selected&&(function(){
          var src=filtered;
          var idx2=src.findIndex(function(e){return epId(e)===epId(selected);});
          return <DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+src.length:null}
            onPrev={idx2>0?function(){setSelected(src[idx2-1]);}:null}
            onNext={idx2<src.length-1?function(){setSelected(src[idx2+1]);}:null}/>;
        })()}
      </div>)}
      {tab==="ki"&&<AIKompass merkliste={merkliste} onSave={saveDiscovery} onBookmark={toggleBookmark} onNavEp={handleNavEp}/>
      }{tab==="smartsuche"&&<SmartSearch merkliste={merkliste} onBookmark={toggleBookmark} onNavEp={handleNavEp} filterMode={filterMode} onFilterMode={setFilterMode}/>
      }{tab==="glossar"&&<Glossar/>
      }{tab==="merkliste"&&<Merkliste merkliste={merkliste} discoveries={discoveries} onRemoveEp={function(id){setMerkliste(function(p){return p.filter(function(x){return x!==id;});});}} onRemoveDisc={function(id){setDiscoveries(function(p){return p.filter(function(d){return d.id!==id;});});}} onShare={shareDiscovery} onNavEp={handleNavEp}/>
      }{tab==="community"&&<Gemeinschaft pins={pins} onNavEp={handleNavEp}/>}
    </div>
  </div>);
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  </div>
