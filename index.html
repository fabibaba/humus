  var sz=640, cx=sz/2, cy=sz/2;

  function arcT(r,ox,oy){ ox=ox||0;oy=oy||0; return "M "+(cx+ox-r)+","+(cy+oy)+" A "+r+","+r+" 0 0,1 "+(cx+ox+r)+","+(cy+oy); }
  function arcB(r,ox,oy){ ox=ox||0;oy=oy||0; return "M "+(cx+ox-r)+","+(cy+oy)+" A "+r+","+r+" 0 0,0 "+(cx+ox+r)+","+(cy+oy); }

  // Venn: vr=156, d=65 → max reach 221 = rInner(233)−12 ✓
  var vr=156, d=65, sin60=0.866, cos60=0.5;
  var Kx=cx,           Ky=cy-d;
  var Fx=cx-d*sin60,   Fy=cy+d*cos60;
  var Sx=cx+d*sin60,   Sy=cy+d*cos60;

  function clickVenn(e){
    var rect=e.currentTarget.getBoundingClientRect();
    var mx=(e.clientX-rect.left)/rect.width*sz;
    var my=(e.clientY-rect.top)/rect.height*sz;
    var dK=Math.sqrt((mx-Kx)*(mx-Kx)+(my-Ky)*(my-Ky));
    var dF=Math.sqrt((mx-Fx)*(mx-Fx)+(my-Fy)*(my-Fy));
    var dS=Math.sqrt((mx-Sx)*(mx-Sx)+(my-Sy)*(my-Sy));
    var inK=dK<vr,inF=dF<vr,inS=dS<vr;
    var reg=null;
    if(inK&&inF&&inS)reg="wirkung";
    else if(inK&&inF)reg="anlässe";
    else if(inF&&inS)reg="prozesse";
    else if(inS&&inK)reg="mittel";
    else if(inK)reg="kontexte";
    else if(inF)reg="figuren";
    else if(inS)reg="strukturen";
    if(reg){
      setActiveVenn(function(a){return a===reg?null:reg;});
      if(props.onVennFilter) props.onVennFilter(reg);
      e.stopPropagation();
    }
  }
  var vennDesc=activeVenn?(VENN_REGIONS.find(function(r){return r.id===activeVenn;})||{}).desc:null;
  var vennLabel=activeVenn?(VENN_REGIONS.find(function(r){return r.id===activeVenn;})||{}).label:null;

  return(

function applyGraphFilters(eps,f,mode){
  mode=mode||"all";
  // Build per-episode filter functions
  function matches(ep){
    var fns=[];
    if(f.sphere) fns.push(ep.spheres.indexOf(f.sphere)>=0);
    var isG=ep.type==="guest";
    if(f.types.length>0) fns.push(f.types.indexOf(ep.type)>=0);
    if(f.alphaRange.length>0&&f.alphaMode&&isG){var parts=ep.guest.split(" ");var word=f.alphaMode==="nachname"?parts[parts.length-1]:parts[0];fns.push(f.alphaRange.some(function(r){return letterInRange((word||"")[0],r);}));}
    if(f.region.length>0&&isG&&ep.region) fns.push(f.region.indexOf(ep.region)>=0);
    if(f.hemisphere.length>0&&isG&&ep.hemisphere) fns.push(f.hemisphere.indexOf(ep.hemisphere)>=0);
    if(f.generation.length>0&&isG&&ep.generation) fns.push(f.generation.indexOf(ep.generation)>=0);
    if(f.gender.length>0&&isG&&ep.gender) fns.push(f.gender.indexOf(ep.gender)>=0);
    return fns;
  }
  var hasFilters=f.types.length>0||f.sphere||f.alphaRange.length>0||f.region.length>0||f.hemisphere.length>0||f.generation.length>0||f.gender.length>0;
  if(!hasFilters) return eps;
  if(mode==="all") return eps.filter(function(ep){var r=matches(ep);return r.length===0||r.every(Boolean);});
  if(mode==="any") return eps.filter(function(ep){var r=matches(ep);return r.some(Boolean);});
  // score
  return eps.map(function(ep){var r=matches(ep);return{ep:ep,s:r.filter(Boolean).length};}).filter(function(x){return x.s>0;}).sort(function(a,b){return b.s-a.s;}).map(function(x){return x.ep;});
}

function describeConnection(ep, other) {
  var reasons = [];
  var sharedS = ep.spheres.filter(function(s){return other.spheres.indexOf(s)>=0;});
  var sharedF = ep.felder.filter(function(f){return other.felder.indexOf(f)>=0;});
  var sharedV = (ep.vennFields||[]).filter(function(v){return (other.vennFields||[]).indexOf(v)>=0;});

  var sLabels = {
    "charakter-werte":"Werte & Charakter",
    "naturkultur-ideen":"Natur & Ideen",
    "bias-fühlen":"Fühlen & Praxis"
  };
  if(sharedS.length>0) reasons.push(sharedS.map(function(s){return sLabels[s]||s;}).join(", "));
  if(sharedF.length>0) reasons.push(sharedF.slice(0,2).join(", "));
  if(sharedV.length>0 && reasons.length===0) reasons.push(sharedV.slice(0,2).join(" & "));
  return reasons.slice(0,2).join(" · ") || "thematische Nähe";
}

function textScore(ep, words) {
  if (!words || words.length === 0) return 0;
  var score = 0;
  var searchable = [ep.guest||"",ep.title||"",ep.role||"",ep.quote||"",(ep.keywords||[]).join(" "),(ep.felder||[]).join(" ")].join(" ").toLowerCase();
  words.forEach(function(w){
    if(searchable.indexOf(w)>=0) score+=2;
    if((ep.guest||"").toLowerCase().indexOf(w)>=0) score+=3;
    if((ep.title||"").toLowerCase().indexOf(w)>=0) score+=2;
    if((ep.quote||"").toLowerCase().indexOf(w)>=0) score+=1;
    (ep.keywords||[]).forEach(function(k){if(k.toLowerCase().indexOf(w)>=0) score+=2;});
  });
  var allMatch=words.every(function(w){return searchable.indexOf(w)>=0;});
  if(allMatch&&words.length>1) score+=5;
  return score;
}

function buildFilterFns(vennList, sphere, felder, gender, generation, hemisphere, words) {
  var fns = [];
  // Each venn tag = one filter function
  vennList.forEach(function(v){
    fns.push({label:"venn:"+v, fn:function(e){return (e.vennFields||[]).indexOf(v)>=0;}});
  });
  if(sphere) fns.push({label:"sphere", fn:function(e){return e.spheres.indexOf(sphere)>=0;}});
  if(felder) fns.push({label:"felder", fn:function(e){return e.felder.indexOf(felder)>=0;}});
  if(gender) fns.push({label:"gender", fn:function(e){return e.gender===gender;}});
  if(generation) fns.push({label:"gen",  fn:function(e){return e.generation===generation;}});
  if(hemisphere) fns.push({label:"hem",  fn:function(e){return e.hemisphere===hemisphere;}});
  if(words&&words.length>0) fns.push({label:"text", fn:function(e){return textScore(e,words)>0;}});
  return fns;
}

function highlight(text, words) {
  if (!text || !words || words.length === 0) return text;
  var result = text;
  words.forEach(function(w) {
    if (w.length < 3) return;
    var re = new RegExp('(' + escReg(w) + ')', 'gi');
    result = result.replace(re, '§§$1§§');
  });
  var parts = result.split('§§');
  return parts.map(function(p, i) {
    var isMatch = i % 2 === 1;
    return isMatch
      ? <mark key={i} style={{background:"#f5e8c8",color:P.dark,borderRadius:2,padding:"0 1px"}}>{p}</mark>
      : p;
  });
}

  // Build one test-function per active filter
  var fns = [];
  vennFilters.forEach(function(v){ fns.push(function(e){return (e.vennFields||[]).indexOf(v)>=0;}); });
  if(sphereFilter) fns.push(function(e){return e.spheres.indexOf(sphereFilter)>=0;});
  if(felderFilter) fns.push(function(e){return e.felder.indexOf(felderFilter)>=0;});
  if(genderF)      fns.push(function(e){return e.gender===genderF;});
  if(genF)         fns.push(function(e){return e.generation===genF;});
  if(hemF)         fns.push(function(e){return e.hemisphere===hemF;});
  if(words.length>0) fns.push(function(e){return textScore(e,words)>0;});

  var results;

    results = EPISODES.map(function(ep){return{ep:ep,score:ep.num};})
      .sort(function(a,b){return b.score-a.score;});
  } else if(fmode==="all") {

      .filter(function(ep){return fns.every(function(f){return f(ep);});})

ing(false);return;}if(data.error){setResp("⚠ API: "+data.error.message);setLoading(false);return;}var t="";if(data.content&&Array.isArray(data.content)){t=data.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("\n\n");}if(!t)t="Keine Antwort erhalten.";setResp(t);setHist(function(h){return h.concat([{role:"user",content:txt},{role:"assistant",content:t}]);});}catch(e){setResp("⚠ Fehler: "+e.message);}setLoading(false);}async function doSave(){if(!saveTitle.trim()||!resp)return;await props.onSave({id:String(Date.now()),title:saveTitle,query:q,response:resp,savedAt:new Date().toISOString()});setSaved(true);}return(<div><div style={{display:"grid",gridTemplateColumns:peekEp?"1fr 300px":"1fr",gap:20,alignItems:"start"}}><div style={{maxWidth:680}}><div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:6}}>🌿 KI-Kompass — {EPISODES.length} Episoden</div><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14}}>{PRESETS.map(function(p){return <button key={p} onClick={function(){setQ(p);ask(p);}} style={{background:P.tealPale,color:P.tealDim,border:"1px solid rgba(58,158,140,0.25)",borderRadius:14,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>{p.substring(0,46)}…</button>;})}</div><div style={{display:"flex",gap:8,marginBottom:14}}><textarea value={q} onChange={function(e){setQ(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();ask(q);}}} placeholder="Deine Frage an den Kompost… (Enter)" rows={2} style={{flex:1,background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:4,padding:"10px 12px",fontSize:13,fontFamily:"Georgia,serif",resize:"none",outline:"none"}}/><button onClick={function(){ask(q);}} disabled={loading||!q.trim()} style={{background:loading?P.creamDim:P.teal,color:P.white,border:"none",borderRadius:4,padding:"0 16px",cursor:loading?"default":"pointer",fontSize:14}}>{loading?"…":"→"}</button></div>{(resp||loading)&&<div style= function Merkliste(props){
  var [comments,setComments]   = useState(function(){return loadLS("hk-comments",{});});
  var [editId,setEditId]       = useState(null);
  var [editText,setEditText]   = useState("");
  var [questions,setQuestions] = useState(function(){return loadLS("hk-questions",[]);});
  var [newQ,setNewQ]           = useState("");
  var [activeQ,setActiveQ]     = useState(null);

  useEffect(function(){saveLS("hk-comments",comments);},[comments]);
  useEffect(function(){saveLS("hk-questions",questions);},[questions]);

  var saved = EPISODES.filter(function(ep){return props.merkliste.indexOf(epId(ep))>=0;});

  function startEdit(id,existing){setEditId(id);setEditText(existing||"");}
  function saveComment(id){setComments(function(c){var n=Object.assign({},c);n[id]=editText;return n;});setEditId(null);}
  function addQuestion(){if(!newQ.trim())return;setQuestions(function(q){return q.concat({id:String(Date.now()),text:newQ.trim(),epIds:[],createdAt:new Date().toISOString()});});setNewQ("");}
  function toggleEpInQ(qId,epId){setQuestions(function(qs){return qs.map(function(q){if(q.id!==qId)return q;var ids=q.epIds.indexOf(epId)>=0?q.epIds.filter(function(x){return x!==epId;}):[...q.epIds,epId];return Object.assign({},q,{epIds:ids});});});}
  function makeSnapshot(q){
    var eps=EPISODES.filter(function(ep){return q.epIds.indexOf(epId(ep))>=0;});
    var text="Frage: "+q.text+"\n\n"+eps.map(function(ep){
      return "• "+(ep.type==="guest"?ep.guest:ep.title)+"\n  "+
             (ep.title||ep.title_en||"")+"\n  "+
             (ep.quote||ep.quote_en||"")+"\n  "+
             "https://youtu.be/"+(ep.yt||"");
    }).join("\n\n");
    var blob=new Blob([text],{type:"text/plain"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="humus-snapshot-"+Date.now()+".txt";
    a.click();
  }

  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:12}}>🔖 Merkliste
      <span style={{color:P.light,fontSize:11,marginLeft:8}}>{saved.length} Einträge</span>
    </div>

    {/* Gespeicherte Episoden */}
    {saved.length===0&&<div style={{color:P.light,fontSize:12,padding:"20px 0"}}>
      Noch nichts gespeichert. Klicke 🔖 auf einer Steckbriefkarte.
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10,marginBottom:20}}>
      {saved.map(function(ep){
        var col=sc((ep.spheres&&ep.spheres[0])||null);
        var id=epId(ep);
        var comment=comments[id]||"";
        var inQ=activeQ&&questions.find(function(q){return q.id===activeQ;});
        var pinned=inQ&&inQ.epIds.indexOf(id)>=0;
        return(<div key={id} style={{background:P.white,border:"1px solid "+(pinned?col+"80":P.creamDim),
          borderTop:"3px solid "+col,borderRadius:8,padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{cursor:"pointer",flex:1}} onClick={function(){props.onNavEp(ep);}}>
              <div style={{color:col,fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold"}}>
                {ep.type==="guest"?ep.guest:ep.title.substring(0,40)+"…"}
              </div>
              <div style={{color:P.mid,fontSize:11,marginTop:2}}>{ep.title.substring(0,55)}…</div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:4}}>
              {activeQ&&<button onClick={function(){toggleEpInQ(activeQ,id);}}
                title={pinned?"Von Frage lösen":"An Frage heften"}
                style={{background:pinned?col+"20":P.creamDim,color:pinned?col:P.mid,border:"1px solid "+(pinned?col:P.creamDim),borderRadius:4,fontSize:11,padding:"2px 6px",cursor:"pointer"}}>
                {pinned?"📌":"📎"}
              </button>}
              <button onClick={function(){props.onRemoveEp(id);}} title="Entfernen"
                style={{background:"none",border:"none",color:P.light,cursor:"pointer",fontSize:14}}>×</button>
            </div>
          </div>
          {editId===id
            ?<div style={{marginTop:6}}>
               <textarea value={editText} onChange={function(e){setEditText(e.target.value);}}
                 placeholder="Kommentar, Frage, Notiz…" rows={2}
                 style={{width:"100%",background:P.cream,color:P.dark,border:"1px solid "+P.creamDim,
                   borderRadius:4,padding:"6px 8px",fontSize:11,fontFamily:"Georgia,serif",
                   resize:"none",outline:"none",boxSizing:"border-box"}}/>
               <div style={{display:"flex",gap:4,marginTop:4}}>
                 <button onClick={function(){saveComment(id);}}
                   style={{background:P.teal,color:P.white,border:"none",borderRadius:4,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>✓ Speichern</button>
                 <button onClick={function(){setEditId(null);}}
                   style={{background:P.creamDim,color:P.mid,border:"none",borderRadius:4,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>Abbrechen</button>
               </div>
             </div>
            :<div onClick={function(){startEdit(id,comment);}} style={{marginTop:4,cursor:"pointer",
               minHeight:20,color:comment?P.mid:P.light,fontSize:11,fontStyle:comment?"normal":"italic",
               padding:"4px 6px",background:P.cream,borderRadius:4}}>
               {comment||"+ Kommentar hinzufügen…"}
             </div>
          }
        </div>);
      })}
    </div>

    {/* Fragen-Board */}
    <div style={{borderTop:"2px solid "+P.creamDim,paddingTop:16}}>
      <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:14,marginBottom:10}}>💬 Meine Fragen</div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={newQ} onChange={function(e){setNewQ(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter")addQuestion();}}
          placeholder="Neue Frage eingeben… (Enter)"
          style={{flex:1,background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:6,
            padding:"8px 12px",fontSize:12,fontFamily:"Georgia,serif",outline:"none"}}/>
        <button onClick={addQuestion}
          style={{background:P.teal,color:P.white,border:"none",borderRadius:6,padding:"8px 14px",fontSize:12,cursor:"pointer"}}>+</button>
      </div>
      {questions.map(function(q){
        var isActive=activeQ===q.id;
        var qEps=EPISODES.filter(function(ep){return q.epIds.indexOf(epId(ep))>=0;});
        return(<div key={q.id} style={{background:isActive?P.tealPale:P.white,
          border:"1px solid "+(isActive?P.teal+"50":P.creamDim),borderRadius:8,
          padding:"10px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{color:P.dark,fontSize:13,fontFamily:"Georgia,serif",flex:1,cursor:"pointer"}}
              onClick={function(){setActiveQ(isActive?null:q.id);}}>
              💬 {q.text}
              <span style={{color:P.light,fontSize:10,marginLeft:8}}>{q.epIds.length} Einträge angeheftet</span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {q.epIds.length>0&&<button onClick={function(){makeSnapshot(q);}} title="Als Textdatei exportieren"
                style={{background:P.goldPale,color:P.gold,border:"1px solid "+P.gold+"50",
                  borderRadius:4,fontSize:11,padding:"2px 8px",cursor:"pointer"}}>📤 Export</button>}
              <button onClick={function(){setQuestions(function(qs){return qs.filter(function(x){return x.id!==q.id;});});if(activeQ===q.id)setActiveQ(null);}}
                style={{background:"none",border:"none",color:P.light,cursor:"pointer",fontSize:14}}>×</button>
            </div>
          </div>
          {isActive&&qEps.length>0&&<div style={{marginTop:8,borderTop:"1px solid "+P.creamDim,paddingTop:6}}>
            {qEps.map(function(ep){return(
              <div key={epId(ep)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"3px 0",borderBottom:"1px solid "+P.creamDim+"80"}}>
                <span style={{color:sc((ep.spheres&&ep.spheres[0])||null),fontSize:11,cursor:"pointer"}}
                  onClick={function(){props.onNavEp(ep);}}>
                  {ep.type==="guest"?ep.guest:ep.title.substring(0,40)+"…"}
                </span>
                <button onClick={function(){toggleEpInQ(q.id,epId(ep));}}
                  style={{background:"none",border:"none",color:P.light,cursor:"pointer",fontSize:12}}>×</button>
              </div>
            );})}
          </div>}
          {isActive&&<div style={{color:P.light,fontSize:10,marginTop:6,fontStyle:"italic"}}>
            Klicke 📎 auf einem Merklisteneintrag oben, um ihn dieser Frage zuzuordnen
          </div>}
        </div>);
      })}
      {questions.length===0&&<div style={{color:P.light,fontSize:11,fontStyle:"italic"}}>
        Formuliere eine Frage und hefte passende Einträge daran – dann exportiere als Snapshot.
      </div>}
    </div>

    {/* Gespeicherte Entdeckungen */}
    {props.discoveries&&props.discoveries.length>0&&<div style={{borderTop:"2px solid "+P.creamDim,paddingTop:16,marginTop:8}}>
      <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:14,marginBottom:8}}>🌿 KI-Entdeckungen</div>
      {props.discoveries.map(function(d){return(
        <div key={d.id} style={{background:P.white,border:"1px solid "+P.creamDim,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div style={{color:P.dark,fontSize:13,fontWeight:"bold"}}>{d.title}</div>
            <button onClick={function(){props.onRemoveDisc(d.id);}} style={{background:"none",border:"none",color:P.light,cursor:"pointer",fontSize:14}}>×</button>
          </div>
          <div style={{color:P.mid,fontSize:11,marginTop:4,lineHeight:1.5}}>{d.response.substring(0,200)}…</div>
        </div>
      );})}
    </div>}
  </div>);
}

// ─── PERSONEN ────────────────────────────────────────────────────────────
function Personen(props) {
  var [search, setSearch] = useState("");
  var [sel, setSel] = useState(null);
  var [hemF, setHemF] = useState(null);

  // Build persons from episodes dynamically
  var personMap = {};
  EPISODES.forEach(function(ep){
    if(!ep.guest || ep.guest==='Unbekannt') return;
    var guests = ep.guest.split(/\s*[&,]\s*|\s+und\s+|\s+and\s+/).filter(function(g){return g.trim().length>2;});
    guests.forEach(function(g){
      g = g.trim();
      var pid = g.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').substring(0,30);
      if(!personMap[pid]){
        personMap[pid]={id:pid,name:g,role:ep.role||'',gender:ep.gender||'',
          generation:ep.generation||'',region:ep.region||'',hemisphere:ep.hemisphere||'',episodes:[]};
      }
      if(personMap[pid].episodes.indexOf(epId(ep))<0) personMap[pid].episodes.push(epId(ep));
    });
  });
  var persons = Object.values(personMap).filter(function(p){return p.episodes.length>0;})
    .sort(function(a,b){return a.name.localeCompare(b.name);});

  var list = persons.filter(function(p){
    if(hemF && p.hemisphere !== hemF) return false;
    if(search.trim()){
      var q=search.toLowerCase();
      return p.name.toLowerCase().indexOf(q)>=0||(p.role||'').toLowerCase().indexOf(q)>=0;
    }
    return true;
  });

  var gC={boomer:"#9a70c8",genx:"#3a9e8c",millennial:"#d46878",genz:"#d4a84b",mixed:"#9a8e80"};

  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>
      👥 Personen & Stimmen
      <span style={{color:P.light,fontSize:11,marginLeft:8}}>{list.length} Personen</span>
    </div>
    <input value={search} onChange={function(e){setSearch(e.target.value);}}
      placeholder="Name oder Rolle suchen…"
      style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,
        borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"Georgia,serif",
        outline:"none",boxSizing:"border-box",marginBottom:10}}/>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
      {[["nord","🌐 Norden","#7cb9c8"],["süd","🌍 Süden","#c87c50"],["mixed","↔ Gemischt","#9a8e80"]].map(function(h){
        var act=hemF===h[0];
        return <button key={h[0]} onClick={function(){setHemF(act?null:h[0]);}}
          style={{background:act?h[2]+"28":P.white,color:act?h[2]:P.mid,
            border:"1px solid "+(act?h[2]:P.creamDim),borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>
          {h[1]}
        </button>;
      })}
      {(search||hemF)&&<button onClick={function(){setSearch("");setHemF(null);}}
        style={{background:P.cream,color:P.mid,border:"1px solid "+P.creamDim,
          borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>✕</button>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
      {list.map(function(p){
        var act=sel===p.id;
        var col=gC[p.generation]||P.teal;
        var eps=EPISODES.filter(function(e){return p.episodes.indexOf(epId(e))>=0;});
        return(
          <div key={p.id} onClick={function(){setSel(act?null:p.id);}}
            style={{background:act?col+"15":P.white,border:"1px solid "+(act?col+"60":P.creamDim),
              borderTop:"3px solid "+col,borderRadius:8,padding:"10px 12px",cursor:"pointer"}}>
            <div style={{color:P.dark,fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",marginBottom:2}}>{p.name}</div>
            <div style={{color:P.mid,fontSize:10,marginBottom:5}}>{(p.role||"").substring(0,50)}</div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              <span style={{background:col+"20",color:col,fontSize:9,padding:"1px 5px",borderRadius:6}}>{p.generation||"?"}</span>
              <span style={{background:P.creamDim,color:P.mid,fontSize:9,padding:"1px 5px",borderRadius:6}}>{p.hemisphere||"?"}</span>
              <span style={{background:P.tealPale,color:P.teal,fontSize:9,padding:"1px 5px",borderRadius:6}}>{eps.length} Eintr.</span>
            </div>
            {act&&eps.length>0&&<div style={{marginTop:8,borderTop:"1px solid "+P.creamDim,paddingTop:6}}>
              {eps.slice(0,4).map(function(e){return(
                <div key={epId(e)} onClick={function(ev){ev.stopPropagation();props.onNavEp(e);}}
                  style={{color:P.teal,fontSize:11,padding:"2px 0",cursor:"pointer",borderBottom:"1px solid "+P.creamDim}}>
                  {(e.title||e.title_en||"").substring(0,42)}…
                </div>
              );})}
              {eps.length>4&&<div style={{color:P.light,fontSize:10,marginTop:2}}>+{eps.length-4} weitere</div>}
            </div>}
          </div>
        );
      })}
    </div>
  </div>);
}


function Glossar(props) {
  var [activeType, setActiveType] = useState(null);
  var [search, setSearch] = useState("");
  var filtered = FRAGMENTS.filter(function(f){
    if(activeType && f.type !== activeType) return false;
    if(search.trim()){var q=search.toLowerCase();return f.title.toLowerCase().indexOf(q)>=0||f.desc.toLowerCase().indexOf(q)>=0;}
    return true;
  });
  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>📚 Glossar & Fragmente
      <span style={{color:P.light,fontSize:11,marginLeft:8}}>{filtered.length} Fragmente</span>
    </div>
    <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Fragment suchen…"
      style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
      {FRAGMENT_TYPES.map(function(t){var act=activeType===t.id;return(
        <button key={t.id} onClick={function(){setActiveType(act?null:t.id);}}
          style={{background:act?t.color+"28":P.white,color:act?t.color:P.mid,border:"1px solid "+(act?t.color:P.creamDim),borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>
          {t.icon} {t.label}
        </button>);
      })}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
      {filtered.map(function(f){
        var ft=FRAGMENT_TYPES.find(function(t){return t.id===f.type;});
        return(<div key={f.id} style={{background:P.white,border:"1px solid "+P.creamDim,borderTop:"3px solid "+(ft?ft.color:P.teal),borderRadius:8,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:16}}>{ft?ft.icon:"📄"}</span>
            <span style={{color:ft?ft.color:P.teal,fontSize:10,background:(ft?ft.color:P.teal)+"18",padding:"2px 7px",borderRadius:10}}>{ft?ft.label:f.type}</span>
          </div>
          <div style={{color:P.dark,fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",marginBottom:5}}>{f.title}</div>
          <div style={{color:P.mid,fontSize:11,lineHeight:1.5}}>{f.desc}</div>
          {f.quote_en&&<div style={{color:P.mid,fontSize:11,fontStyle:"italic",marginTop:8,borderLeft:"2px solid "+(ft?ft.color:P.teal),paddingLeft:8}}>"{f.quote_en}"</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:6}}>{(f.keywords||[]).map(function(k){return <span key={k} style={{background:P.creamDim,color:P.mid,fontSize:9,padding:"2px 6px",borderRadius:8}}>{k}</span>;})}</div>
          {(f.episodes||[]).length>0&&<div style={{marginTop:8,borderTop:"1px solid "+P.creamDim,paddingTop:6}}>
            <div style={{color:P.light,fontSize:9,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Verknüpfte Einträge</div>
            {EPISODES.filter(function(ep){return (f.episodes||[]).indexOf(ep.id||epId(ep))>=0;}).slice(0,3).map(function(ep){
              var c=sc((ep.spheres&&ep.spheres[0])||null);
              return <div key={epId(ep)} onClick={function(){if(props.onNavEp)props.onNavEp(ep);}}
                style={{color:c,fontSize:11,padding:"2px 0",cursor:"pointer",borderBottom:"1px solid "+P.creamDim+"80"}}>
                {ep.type==="guest"?ep.guest:ep.title.substring(0,40)+"…"}
              </div>;
            })}
          </div>}
        </div>);
      })}
    </div>
    {FRAGMENTS.length===0&&<div style={{color:P.mid,fontSize:12,padding:20,textAlign:"center",background:P.tealPale,borderRadius:8,marginTop:10}}>
      💡 Fragmente werden automatisch aus Transkripten extrahiert wenn neue Einträge verarbeitet werden.
    </div>}
  </div>);
}

// ─── STORAGE HELPERS ─────────────────────────────────────────────────────
function loadLS(key, fallback) {
  try { var v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } 
  catch(e) { return fallback; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

  var [filterMode,setFilterMode]=useState("all");

  var [search,setSearch]=useState("");
  var [navHistory,setNavHistory]=useState([]);
  var [gFilters,setGFilters]=useState(defaultFilters());
  var [resetKey,setResetKey]=useState(0);

  function handleGFilter(field,val){setGFilters(function(f){var n=Object.assign({},f);if(field==="sphere"){n.sphere=val;}else if(field==="alphaMode"){n.alphaMode=val;}else{n[field]=toggleArr(f[field]||[],val);}return n;});}
  function navigateTo(nt,ns){setNavHistory(function(h){return h.concat([{tab:tab,selected:selected}]);});setTab(nt);setSelected(ns||null);}
  function goBack(){if(navHistory.length===0)return;var p=navHistory[navHistory.length-1];setNavHistory(function(h){return h.slice(0,-1);});setTab(p.tab);setSelected(p.selected);}
  // Persist to localStorage on change
  useEffect(function(){saveLS("hk-merkliste",merkliste);},[merkliste]);
  useEffect(function(){saveLS("hk-discoveries",discoveries);},[discoveries]);
  useEffect(function(){saveLS("hk-pins",pins);},[pins]);

  function handleNavEp(ep){navigateTo("kompass",ep);}
  async function toggleBookmark(ep){var id=epId(ep);await setMerkliste(function(p){return p.indexOf(id)>=0?p.filter(function(x){return x!==id;}):p.concat([id]);});}
  async function saveDiscovery(disc){await setDiscoveries(function(p){return p.concat([disc]);});}
  async function shareDiscovery(disc){var pin={id:String(Date.now()),authorName:"Anonym",title:disc.title,query:disc.query,response:disc.response,createdAt:new Date().toISOString()};await setPins(function(p){return p.concat([pin]);});navigateTo("community",null);}

  var _fns=[];
  if(sphere)_fns.push(function(e){return e.spheres.indexOf(sphere)>=0;});
  if(felder)_fns.push(function(e){return e.felder.indexOf(felder)>=0;});
  if(vennFilter)_fns.push(function(e){return e.vennFields&&e.vennFields.indexOf(vennFilter)>=0;});
  if(search.trim()){var _sq=search.toLowerCase();_fns.push(function(e){return (e.guest&&e.guest.toLowerCase().indexOf(_sq)>=0)||e.title.toLowerCase().indexOf(_sq)>=0||e.keywords.some(function(k){return k.toLowerCase().indexOf(_sq)>=0;})||(e.quote&&e.quote.toLowerCase().indexOf(_sq)>=0)||e.felder.some(function(f){return f.toLowerCase().indexOf(_sq)>=0;});});}
  var filtered=_fns.length===0?EPISODES:filterMode==="all"?EPISODES.filter(function(e){return _fns.every(function(f){return f(e);});}):filterMode==="any"?EPISODES.filter(function(e){return _fns.some(function(f){return f(e);});}):EPISODES.map(function(e){return{ep:e,s:_fns.filter(function(f){return f(e);}).length};}).filter(function(r){return r.s>0;}).sort(function(a,b){return b.s-a.s;}).map(function(r){return r.ep;});
  var gFiltered=applyGraphFilters(EPISODES,gFilters,filterMode);
  function selToggle(ep){setSelected(function(s){return s&&epId(s)===epId(ep)?null:ep;});}
  var TABS=[["kompass","🧭 Kompass"],["graph","🕸 Graph"],["suche","🔍 Suche"],["ki","🌿 KI-Kompass"],["smartsuche","🔎 Smart-Suche"],["personen","👥 Personen"],["glossar","📚 Glossar"],["merkliste","🔖 Merkliste"+(merkliste.length>0?" ("+merkliste.length+")":"")],["community","📌 Netzwerk"+(pins.length>0?" ("+pins.length+")":"")]];
  return(<div style={{background:P.cream,color:P.dark,minHeight:"100vh",fontFamily:"Georgia,serif",position:"relative"}}>
    <div style={{background:P.white,borderBottom:"2px solid rgba(58,158,140,0.12)",padding:"12px 20px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
        <button onClick={goBack} disabled={navHistory.length===0}
          style={{background:navHistory.length>0?P.tealPale:P.creamDim,color:navHistory.length>0?P.teal:P.light,border:"1px solid "+(navHistory.length>0?P.teal+"50":P.creamDim),borderRadius:6,padding:"4px 10px",fontSize:12,cursor:navHistory.length>0?"pointer":"default",fontFamily:"Georgia,serif",opacity:navHistory.length>0?1:0.4}}
          title={navHistory.length>0?"Zurück ("+navHistory.length+" Schritte)":"Kein Verlauf"}>
          ← Zurück{navHistory.length>1?" ("+navHistory.length+")":""}
        </button>
        <span style={{color:P.teal,fontSize:16,fontWeight:"bold"}}>🌱 Humus-Kompass</span>
        <span style={{color:P.light,fontSize:11}}>{EPISODES.length} Einträge</span>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",flexWrap:"wrap"}}>{TABS.map(function(t){return(<button key={t[0]} onClick={function(){setTab(t[0]);setNavHistory([]);}} style={{background:"transparent",color:tab===t[0]?P.teal:P.mid,border:"none",borderBottom:"2px solid "+(tab===t[0]?P.teal:"transparent"),padding:"7px 12px",cursor:"pointer",fontSize:11,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{t[1]}</button>);})}</div>
        <div style={{padding:"4px 8px"}}><FilterModeToggle mode={filterMode} onChange={setFilterMode}/></div>
      </div>
    </div>
    <div style={{padding:"18px 20px"}}>
      {tab==="kompass"&&(<div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:20,alignItems:"start"}}>
        <div style={{minWidth:300,maxWidth:620}}>
          <Compass activeSphere={sphere} activeFelder={felder} activeVennFilter={vennFilter}
            onSphere={function(id){setSphere(function(p){return p===id?null:id;});}}
            onFelder={function(f){setFelder(function(p){return p===f?null:f;});}}
            onVennFilter={function(id){setVennFilter(function(p){return p===id?null:id;});}}
            count={filtered.length}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            {(sphere||felder||vennFilter)?<div style={{color:P.mid,fontSize:11,padding:"4px 8px",background:P.white,borderRadius:4,border:"1px solid "+P.creamDim}}>Linse: {sphere&&<strong style={{color:sc(sphere)}}>{(SPHERES.find(function(s){return s.id===sphere;})||{}).iLabel}</strong>}{sphere&&felder&&" · "}{felder&&<strong style={{color:P.teal}}>{felder}</strong>}{(sphere||felder)&&vennFilter&&" · "}{vennFilter&&<strong style={{color:"#6a50a0"}}>⬡ {vennFilter}</strong>}</div>:<div/>}
            <FilterModeToggle mode={filterMode} onChange={setFilterMode}/>
          </div>
          <div style={{maxHeight:560,overflowY:"auto",paddingRight:4}}>
            {filtered.length===0?<div style={{color:P.light,fontSize:13}}>Keine Einträge.</div>:filtered.map(function(ep){return <EpCard key={epId(ep)} ep={ep} onClick={selToggle} active={selected&&epId(selected)===epId(ep)} bookmarked={merkliste.indexOf(epId(ep))>=0} onBookmark={toggleBookmark}/>;})}</div>
        </div>
        {selected&&(function(){
          var idx2=filtered.findIndex(function(e){return epId(e)===epId(selected);});
          return <div style={{gridColumn:"1 / -1"}}><DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+filtered.length:null}
            onPrev={idx2>0?function(){setSelected(filtered[idx2-1]);}:null}
            onNext={idx2<filtered.length-1?function(){setSelected(filtered[idx2+1]);}:null}/></div>;
        })()}
      </div>)}
      {tab==="graph"&&(<div style={{display:"grid",gridTemplateColumns:selected?"1fr 300px":"1fr",gap:20}}>
        <div>
          <GraphFilterPanel filters={gFilters} onChange={handleGFilter} filterMode={filterMode} onFilterMode={setFilterMode} onResetFilters={function(){setGFilters(defaultFilters());}} onResetLayout={function(){setResetKey(function(k){return k+1;});}} onResetPins={function(){setResetKey(function(k){return k+1;});}}/>
          <div style={{color:P.light,fontSize:11,marginBottom:8}}>{gFiltered.length} von {EPISODES.length} Einträge sichtbar</div>
          <div style={{background:P.white,borderRadius:8,border:"1px solid "+P.creamDim,overflow:"hidden"}}>
            <Graph key={resetKey} eps={gFiltered.length>0?gFiltered:EPISODES} selected={selected} onSelect={selToggle}/>
          </div>
          <div style={{color:P.light,fontSize:10,marginTop:6,textAlign:"center"}}>Knoten ziehen → bleiben fixiert · ⟳ Layout für Reset</div>
        </div>
        {selected&&(function(){
          var src=gFiltered;
          var idx2=src.findIndex(function(e){return epId(e)===epId(selected);});
          return <DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+src.length:null}
            onPrev={idx2>0?function(){setSelected(src[idx2-1]);}:null}
            onNext={idx2<src.length-1?function(){setSelected(src[idx2+1]);}:null}/>;
        })()}
      </div>)}
      {tab==="suche"&&(<div style={{display:"grid",gridTemplateColumns:selected?"1fr 300px":"1fr",gap:20}}>
        <div>
          {(function(){
            var words = [];
            if(search.trim().length >= 2){
              var q = search.toLowerCase();
              var seen = {};
              EPISODES.forEach(function(ep){
                (ep.keywords||[]).concat(ep.keywords_en||[]).forEach(function(k){
                  if(k && k.toLowerCase().indexOf(q)>=0 && !seen[k.toLowerCase()]){
                    seen[k.toLowerCase()]=true; words.push(k);
                  }
                });
                if(ep.guest && ep.guest.toLowerCase().indexOf(q)>=0 && !seen[ep.guest.toLowerCase()]){
                  seen[ep.guest.toLowerCase()]=true; words.push(ep.guest);
                }
              });
              words = words.slice(0,6);
            }
            return(<div style={{position:"relative"}}>
              <input value={search} onChange={function(e){setSearch(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter"&&words.length>0){setSearch(words[0]);}}}
                placeholder="Person, Thema, Stichwort… (Enter für Vorschlag)"
                style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,
                  borderRadius:6,padding:"10px 14px",fontSize:13,fontFamily:"Georgia,serif",
                  outline:"none",boxSizing:"border-box"}}/>
              {words.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:P.white,
                border:"1px solid "+P.creamDim,borderRadius:"0 0 6px 6px",zIndex:100,boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>
                {words.map(function(w,i){return(
                  <div key={w} onClick={function(){setSearch(w);}}
                    style={{padding:"6px 14px",cursor:"pointer",fontSize:12,
                      background:i===0?P.tealPale:"transparent",color:i===0?P.teal:P.dark,
                      borderBottom:"1px solid "+P.creamDim}}>
                    {i===0&&<span style={{fontSize:10,color:P.light,marginRight:6}}>↵</span>}
                    {w}
                  </div>
                );})}
              </div>}
            </div>);
          })()}
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>{SPHERES.map(function(s){return <button key={s.id} onClick={function(){setSphere(function(p){return p===s.id?null:s.id;});}} style={{background:sphere===s.id?s.pale:"transparent",color:s.color,border:"1px solid "+s.color+"60",borderRadius:12,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>{s.iLabel.split(" ·")[0]}</button>;})}</div>
          <div style={{color:P.light,fontSize:11,margin:"8px 0 6px"}}>{filtered.length} Einträge</div>
          <div style={{maxHeight:520,overflowY:"auto"}}>{filtered.map(function(ep){return <EpCard key={epId(ep)} ep={ep} onClick={selToggle} active={selected&&epId(selected)===epId(ep)} bookmarked={merkliste.indexOf(epId(ep))>=0} onBookmark={toggleBookmark}/>;})}</div>
        </div>
        {selected&&(function(){
          var src=filtered;
          var idx2=src.findIndex(function(e){return epId(e)===epId(selected);});
          return <DetailPanel ep={selected} onClose={function(){setSelected(null);}}
            bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
            onNavEp={handleNavEp} onSelect={setSelected}
            position={idx2>=0?(idx2+1)+" / "+src.length:null}
            onPrev={idx2>0?function(){setSelected(src[idx2-1]);}:null}
            onNext={idx2<src.length-1?function(){setSelected(src[idx2+1]);}:null}/>;
        })()}
      </div>)}
      {tab==="ki"&&<AIKompass merkliste={merkliste} onSave={saveDiscovery} onBookmark={toggleBookmark} onNavEp={handleNavEp}/>
      }{tab==="smartsuche"&&<SmartSearch merkliste={merkliste} onBookmark={toggleBookmark} onNavEp={handleNavEp} filterMode={filterMode} onFilterMode={setFilterMode}/>
      }{tab==="personen"&&<Personen onNavEp={handleNavEp}/>
      }{tab==="glossar"&&<Glossar onNavEp={handleNavEp}/>
      }{tab==="merkliste"&&<Merkliste merkliste={merkliste} discoveries={discoveries} onRemoveEp={function(id){setMerkliste(function(p){return p.filter(function(x){return x!==id;});});}} onRemoveDisc={function(id){setDiscoveries(function(p){return p.filter(function(d){return d.id!==id;});});}} onShare={shareDiscovery} onNavEp={handleNavEp}/>
      }{tab==="community"&&<Gemeinschaft pins={pins} onNavEp={handleNavEp}/>}
    </div>
  </div>);
}

    const domRoot = ReactDOM.createRoot(document.getElementById('root'));
    domRoot.render(<App />);
  </script>
  <div style="background:#2c2820;color:#9a8e80;padding:10px 20px;font-family:Georgia,serif;font-size:11px;border-top:2px solid #3a9e8c;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <span>🌱 <strong style="color:#f6f0e6">Humus-Kompass</strong> · <a href="https://hamburg.global" target="_blank" style="color:#3a9e8c;text-decoration:none;">hamburg.global</a> · MIT-Lizenz</span>
    <span>Alle Inhalte © der jeweiligen Urheber:innen · §&nbsp;51&nbsp;UrhG · <a href="NOTICE.md" target="_blank" style="color:#3a9e8c;text-decoration:none;">Inhaltshinweis</a></span>
  </div>
