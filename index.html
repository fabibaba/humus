function epId(ep){return ep.type+String(ep.num)+ep.guest.replace(/\s/g,"");}

function Compass(props) {
  var sz=640, cx=sz/2, cy=sz/2;
  var [activeVenn, setActiveVenn] = useState(null);

  function arcT(r,ox,oy){ ox=ox||0;oy=oy||0; return "M "+(cx+ox-r)+","+(cy+oy)+" A "+r+","+r+" 0 0,1 "+(cx+ox+r)+","+(cy+oy); }
  function arcB(r,ox,oy){ ox=ox||0;oy=oy||0; return "M "+(cx+ox-r)+","+(cy+oy)+" A "+r+","+r+" 0 0,0 "+(cx+ox+r)+","+(cy+oy); }

  // Venn: vr=156, d=65 → max reach 221 = rInner(233)−12 ✓
  var vr=156, d=65, sin60=0.866, cos60=0.5;
  var Kx=cx,           Ky=cy-d;
  var Fx=cx-d*sin60,   Fy=cy+d*cos60;
  var Sx=cx+d*sin60,   Sy=cy+d*cos60;

  function clickVenn(e){
    var rect=e.currentTarget.getBoundingClientRect();
    var mx=(e.clientX-rect.left)/rect.width*sz;
    var my=(e.clientY-rect.top)/rect.height*sz;
    var dK=Math.sqrt((mx-Kx)*(mx-Kx)+(my-Ky)*(my-Ky));
    var dF=Math.sqrt((mx-Fx)*(mx-Fx)+(my-Fy)*(my-Fy));
    var dS=Math.sqrt((mx-Sx)*(mx-Sx)+(my-Sy)*(my-Sy));
    var inK=dK<vr,inF=dF<vr,inS=dS<vr;
    var reg=null;
    if(inK&&inF&&inS)reg="wirkung";
    else if(inK&&inF)reg="anlässe";
    else if(inF&&inS)reg="prozesse";
    else if(inS&&inK)reg="mittel";
    else if(inK)reg="kontexte";
    else if(inF)reg="figuren";
    else if(inS)reg="strukturen";
    if(reg){
      setActiveVenn(function(a){return a===reg?null:reg;});
      if(props.onVennFilter) props.onVennFilter(reg);
      e.stopPropagation();
    }
  }
  var vennDesc=activeVenn?(VENN_REGIONS.find(function(r){return r.id===activeVenn;})||{}).desc:null;
  var vennLabel=activeVenn?(VENN_REGIONS.find(function(r){return r.id===activeVenn;})||{}).label:null;

  return(
    <div onClick={function(){setActiveVenn(null);}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:P.mid,fontFamily:"Georgia,serif",marginBottom:4,padding:"0 2px"}}>
        <span>⟳ Sphären für den Sinn</span>
        <span>Felder zum Machen ↓</span>
      </div>

      <svg width="100%" viewBox={"0 0 "+sz+" "+sz}
        style={{display:"block",maxWidth:sz,margin:"0 auto",cursor:"pointer"}}
        onClick={clickVenn}>
        <defs>
          {/* Sphere bands */}
          {SPHERES.map(function(s){return [
            <path key={"at"+s.id} id={"at-"+s.id} d={arcT(s.rOuter-10)}/>,
            <path key={"ab"+s.id} id={"ab-"+s.id} d={arcB(s.rInner+10)}/>,
          ];})}
          {/*
            Venn circle label arcs — r=134, inside each circle's non-overlapping zone:
            vK: top of Kontexte circle (K at 320,255) → standard top arc
            vF: lower-left of Figuren circle (F at 263.7,352.5)
                arc from 60° to 240° CW, midpoint at 150° = (147.7, 419.5)
            vS: lower-right of Strukturen circle (S at 376.3,352.5)
                arc from 300° to 120° CW, midpoint at 30° = (492.3, 419.5)
            Together these form an equilateral triangle of label positions.
          */}
          <path id="vK" d="M 186,255 A 134,134 0 0,1 454,255"/>
          <path id="vF" d="M 196.7,236.5 A 134,134 0 0,0 330.7,468.5"/>
          <path id="vS" d="M 309.3,468.5 A 134,134 0 0,0 443.3,236.5"/>
        </defs>

        {/* Band fills */}
        <circle cx={cx} cy={cy} r={308} fill={"#3a9e8c14"}/>
        <circle cx={cx} cy={cy} r={283} fill={"#d4a84b18"}/>
        <circle cx={cx} cy={cy} r={258} fill={"#e0806a22"}/>
        <circle cx={cx} cy={cy} r={233} fill={P.cream}/>

        {/* Sphere bands */}
        {SPHERES.map(function(s){
          var act=props.activeSphere===s.id;
          return(
            <g key={s.id} onClick={function(e){e.stopPropagation();props.onSphere(s.id);}} style={{cursor:"pointer"}}>
              {act&&<circle cx={cx} cy={cy} r={Math.round((s.rOuter+s.rInner)/2)}
                fill="none" stroke={s.color} strokeWidth={s.rOuter-s.rInner-4} strokeOpacity={0.12}/>}
              <circle cx={cx} cy={cy} r={s.rOuter} fill="none"
                stroke={s.color} strokeWidth={act?2.5:1.5} strokeOpacity={act?1:0.6}/>
              <circle cx={cx} cy={cy} r={s.rInner} fill="none"
                stroke={s.color} strokeWidth={act?1.5:0.8} strokeOpacity={act?0.7:0.35}
                strokeDasharray="5,4"/>
              <text textAnchor="middle" fontFamily="Georgia,serif"
                fontSize={act?10:9.5} fill={s.color}
                fontWeight={act?"bold":"normal"} opacity={act?1:0.9}>
                <textPath href={"#at-"+s.id} startOffset="50%">{s.oLabel}</textPath>
              </text>
              <text textAnchor="middle" fontFamily="Georgia,serif"
                fontSize={act?9.5:9} fill={s.color}
                fontWeight={act?"bold":"normal"} opacity={act?0.9:0.78}>
                <textPath href={"#ab-"+s.id} startOffset="50%">{s.iLabel}</textPath>
              </text>
            </g>
          );
        })}

        {/* Venn circles */}
        <circle cx={Kx} cy={Ky} r={vr}
          fill={"#3a9e8c"+(activeVenn==="kontexte"||(props.activeVennFilter==="kontexte")?"40":"18")}
          stroke="#3a9e8c" strokeWidth={(activeVenn==="kontexte"||(props.activeVennFilter==="kontexte"))?2.5:1.5} strokeOpacity={0.7}/>
        <circle cx={Fx} cy={Fy} r={vr}
          fill={"#d46878"+(activeVenn==="figuren"||(props.activeVennFilter==="figuren")?"40":"18")}
          stroke="#d46878" strokeWidth={(activeVenn==="figuren"||(props.activeVennFilter==="figuren"))?2.5:1.5} strokeOpacity={0.7}/>
        <circle cx={Sx} cy={Sy} r={vr}
          fill={"#9a70c8"+(activeVenn==="strukturen"||(props.activeVennFilter==="strukturen")?"40":"18")}
          stroke="#9a70c8" strokeWidth={(activeVenn==="strukturen"||(props.activeVennFilter==="strukturen"))?2.5:1.5} strokeOpacity={0.7}/>

        {/* Main circle labels — curved inside each circle's outer (non-overlapping) zone */}
        <text textAnchor="middle" fontFamily="Georgia,serif" fontSize={13} fill="#2a7265" fontWeight="bold">
          <textPath href="#vK" startOffset="50%">Kontexte / Inhalte / Fragen</textPath>
        </text>
        <text textAnchor="middle" fontFamily="Georgia,serif" fontSize={13.5} fill="#8a2838" fontWeight="bold">
          <textPath href="#vF" startOffset="50%">Figuren</textPath>
        </text>
        <text textAnchor="middle" fontFamily="Georgia,serif" fontSize={13} fill="#5a40a0" fontWeight="bold">
          <textPath href="#vS" startOffset="50%">Strukturen / Systeme</textPath>
        </text>

        {/*
          Intersection labels — equilateral triangle, R=115 from center:
          Anlässe  (KF-only, away from S): (220, 263) — dS=180 > vr ✓
          Prozesse (FS-only, away from K): (320, 435) — dK=180 > vr ✓
          Mittel   (SK-only, away from F): (420, 263) — dF=180 > vr ✓
          All sides ≈ 199px → equilateral
        */}
        <text x={206} y={248} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="anlässe"?"bold":"normal"} opacity={activeVenn==="anlässe"?1:0.65}>Anlässe &amp;</text>
        <text x={206} y={262} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="anlässe"?"bold":"normal"} opacity={activeVenn==="anlässe"?1:0.65}>Motivationen</text>

        <text x={320} y={445} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="prozesse"?"bold":"normal"} opacity={activeVenn==="prozesse"?1:0.65}>Prozesse &amp;</text>
        <text x={320} y={459} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="prozesse"?"bold":"normal"} opacity={activeVenn==="prozesse"?1:0.65}>Routinen</text>

        <text x={434} y={248} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="mittel"?"bold":"normal"} opacity={activeVenn==="mittel"?1:0.65}>Mittel &amp;</text>
        <text x={434} y={262} textAnchor="middle" fontSize={10.5} fontFamily="Georgia,serif" fill={P.dark}
          fontWeight={activeVenn==="mittel"?"bold":"normal"} opacity={activeVenn==="mittel"?1:0.65}>Werkzeuge</text>

        {/* Wirkung — triple center */}
        <text x={cx} y={cy+8} textAnchor="middle" fontSize={15} fontFamily="Georgia,serif"
          fill={(activeVenn==="wirkung"||(props.activeVennFilter==="wirkung"))?P.teal:P.dark}
          fontWeight="bold" opacity={(activeVenn==="wirkung"||(props.activeVennFilter==="wirkung"))?1:0.82}>Wirkung</text>
      </svg>

      {vennDesc&&(
        <div style={{background:P.white,border:"1px solid "+P.teal+"50",borderRadius:6,padding:"8px 12px",margin:"2px 0 6px",fontSize:12,color:P.dark,lineHeight:1.5}}>
          <strong style={{color:P.teal}}>{vennLabel}</strong><br/>
          <span style={{color:P.mid,fontStyle:"italic"}}>{vennDesc}</span>
        </div>
      )}

      <div style={{display:"flex",gap:5,flexWrap:"wrap",margin:"6px 0 4px"}}>
        {SPHERES.map(function(s){var act=props.activeSphere===s.id;return(
          <button key={s.id} onClick={function(){props.onSphere(s.id);}}
            style={{background:act?s.pale:P.white,color:s.color,border:"1px solid "+(act?s.color:s.color+"50"),borderRadius:12,padding:"3px 9px",fontSize:10,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            {act?"✓ ":""}{s.iLabel.split(" ·")[0]} / {s.oLabel.split(" ·")[0]}
          </button>
        );})}
      </div>

      <div style={{borderTop:"2px dashed "+P.teal+"45",paddingTop:10,marginTop:4,background:"linear-gradient(to bottom,"+P.tealPale+"25,transparent)",padding:"10px 10px 12px",borderRadius:"0 0 8px 8px"}}>

function textScore(ep, words) {
  if (!words || words.length === 0) return 0;
  var score = 0;
  var searchable = [ep.guest||"",ep.title||"",ep.role||"",ep.quote||"",(ep.keywords||[]).join(" "),(ep.felder||[]).join(" ")].join(" ").toLowerCase();
  words.forEach(function(w){
    if(searchable.indexOf(w)>=0) score+=2;
    if((ep.guest||"").toLowerCase().indexOf(w)>=0) score+=3;
    if((ep.title||"").toLowerCase().indexOf(w)>=0) score+=2;
    if((ep.quote||"").toLowerCase().indexOf(w)>=0) score+=1;
    (ep.keywords||[]).forEach(function(k){if(k.toLowerCase().indexOf(w)>=0) score+=2;});
  });
  var allMatch=words.every(function(w){return searchable.indexOf(w)>=0;});
  if(allMatch&&words.length>1) score+=5;
  return score;
}

function buildFilterFns(vennList, sphere, felder, gender, generation, hemisphere, words) {
  var fns = [];
  // Each venn tag = one filter function
  vennList.forEach(function(v){
    fns.push({label:"venn:"+v, fn:function(e){return (e.vennFields||[]).indexOf(v)>=0;}});
  });
  if(sphere) fns.push({label:"sphere", fn:function(e){return e.spheres.indexOf(sphere)>=0;}});
  if(felder) fns.push({label:"felder", fn:function(e){return e.felder.indexOf(felder)>=0;}});
  if(gender) fns.push({label:"gender", fn:function(e){return e.gender===gender;}});
  if(generation) fns.push({label:"gen",  fn:function(e){return e.generation===generation;}});
  if(hemisphere) fns.push({label:"hem",  fn:function(e){return e.hemisphere===hemisphere;}});
  if(words&&words.length>0) fns.push({label:"text", fn:function(e){return textScore(e,words)>0;}});
  return fns;
}

function highlight(text, words) {
  if (!text || !words || words.length === 0) return text;
  var result = text;
  words.forEach(function(w) {
    if (w.length < 3) return;
    var re = new RegExp('(' + escReg(w) + ')', 'gi');
    result = result.replace(re, '§§$1§§');
  });
  var parts = result.split('§§');
  return parts.map(function(p, i) {
    var isMatch = i % 2 === 1;
    return isMatch
      ? <mark key={i} style={{background:"#f5e8c8",color:P.dark,borderRadius:2,padding:"0 1px"}}>{p}</mark>
      : p;
  });
}

                  z.youtube?"▶ "+z.youtube:"",

                ].filter(Boolean).join("\n");

                var a=document.createElement("a");
                a.href=URL.createObjectURL(blob);

                  borderRadius:4,fontSize:10,padding:"1px 7px",cursor:"pointer"}}>📋</button>
            </div>
          </div>);

      </div>
    </div>}

    {/* Fragen-Board */}
    <div style={{borderTop:"2px solid "+P.creamDim,paddingTop:16}}>
      <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:14,marginBottom:10}}>💬 Meine Fragen</div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={newQ} onChange={function(e){setNewQ(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter")addQuestion();}}
          placeholder="Neue Frage eingeben… (Enter)"
          style={{flex:1,background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:6,
            padding:"8px 12px",fontSize:12,fontFamily:"Georgia,serif",outline:"none"}}/>
        <button onClick={addQuestion}
          style={{background:P.teal,color:P.white,border:"none",borderRadius:6,padding:"8px 14px",fontSize:12,cursor:"pointer"}}>+</button>
      </div>
      {questions.map(function(q){
        var isActive=activeQ===q.id;
        var qEps=EPISODES.filter(function(ep){return q.epIds.indexOf(epId(ep))>=0;});
        return(<div key={q.id} style={{background:isActive?P.tealPale:P.white,
          border:"1px solid "+(isActive?P.teal+"50":P.creamDim),borderRadius:8,
          padding:"10px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{color:P.dark,fontSize:13,fontFamily:"Georgia,serif",flex:1,cursor:"pointer"}}
              onClick={function(){setActiveQ(isActive?null:q.id);}}>
              💬 {q.text}
              <span style={{color:P.light,fontSize:10,marginLeft:8}}>{q.epIds.length} Einträge angeheftet</span>
              {q._guest&&<span style={{color:P.light,fontSize:9,marginLeft:4}}>— {q._guest.substring(0,30)}</span>}
            </div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              {q._yt&&<a href={"https://youtu.be/"+q._yt} target="_blank" rel="noreferrer"
                style={{color:P.light,fontSize:10,textDecoration:"none",border:"1px solid "+P.creamDim,borderRadius:4,padding:"2px 7px"}}>▶ Quelle</a>}
              {(q.epIds.length>0||(props.zitate||[]).some(function(z){return q.epIds.indexOf(z.id)>=0;}))&&
              <button onClick={function(){makeSnapshot(q);}} title="Als Textdatei exportieren"
                style={{background:P.goldPale,color:P.gold,border:"1px solid "+P.gold+"50",
                  borderRadius:4,fontSize:11,padding:"2px 8px",cursor:"pointer"}}>📤 Export</button>}
              {(q.epIds.length>0||(props.zitate||[]).some(function(z){return q.epIds.indexOf(z.id)>=0;}))&&
              <button onClick={function(){
                // Toggle _glossar flag on this question
                setQuestions(function(qs){return qs.map(function(qq){
                  if(qq.id!==q.id)return qq;
                  return Object.assign({},qq,{_glossar:!qq._glossar});
                });});
              }} title={q._glossar?"Im Glossar sichtbar – klicken zum Entfernen":"Als Glossareintrag im Glossar anzeigen"}
                style={{background:q._glossar?P.teal:P.tealPale,color:q._glossar?P.white:P.teal,
                  border:"1px solid "+P.teal+"50",borderRadius:4,fontSize:11,
                  padding:"2px 8px",cursor:"pointer"}}>
                {q._glossar?"📚 Im Glossar ✓":"📚 → Glossar"}
              </button>}
              {(q.epIds.length>0||(props.zitate||[]).some(function(z){return q.epIds.indexOf(z.id)>=0;}))&&
              <button onClick={function(){
                var qZitate=(props.zitate||[]).filter(function(z){return q.epIds.indexOf(z.id)>=0;});
                var eps=EPISODES.filter(function(ep){return q.epIds.indexOf(epId(ep))>=0;});
                var frag={
                  id:"custom-"+Date.now(),
                  type:"frage",
                  title:q.text,
                  desc:qZitate.length>0?qZitate[0].text.substring(0,150):"Aus Werkliste erstellt",
                  keywords:eps.slice(0,3).map(function(ep){return ep.guest||ep.title||"";}),
                  episodes:eps.map(function(ep){return ep.id||epId(ep);}),
                  quote_en:qZitate.length>0?qZitate[0].text.substring(0,150):null,
                  _custom:true,
                  _savedAt:new Date().toISOString(),

                prompt("✅ Gespeichert! Kopiere diesen JSON und schicke ihn an Claude um das Fragment dauerhaft einzubauen:",JSON.stringify(frag));
              }} title="Als dauerhaftes Glossar-Fragment speichern"

                  borderRadius:4,fontSize:11,padding:"2px 8px",cursor:"pointer"}}>📚 → Glossar</button>}

            </div>
          </div>

          </div>}

          </div>}
        </div>);
      })}

      </div>}
    </div>

    {/* Gespeicherte Entdeckungen */}
    {props.discoveries&&props.discoveries.length>0&&<div style={{borderTop:"2px solid "+P.creamDim,paddingTop:16,marginTop:8}}>
      <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:14,marginBottom:8}}>🌿 KI-Entdeckungen</div>

        <div key={d.id} style={{background:P.white,border:"1px solid "+P.creamDim,borderRadius:8,padding:"10px 14px",marginBottom:8}}>

          </div>
          <div style={{color:P.mid,fontSize:11,marginTop:4,lineHeight:1.5}}>{d.response.substring(0,200)}…</div>
        </div>
      );})}
    </div>}
  </div>);
}

// ─── PERSONEN ────────────────────────────────────────────────────────────
function Personen(props) {
  var [search, setSearch] = useState("");
  var [sel, setSel] = useState(null);
  var [selPerson, setSelPerson] = useState(null);
  var [hemF, setHemF] = useState(null);

  // Build persons from episodes dynamically
  var personMap = {};
  EPISODES.forEach(function(ep){
    if(!ep.guest || ep.guest==='Unbekannt') return;
    var guests = ep.guest.split(/\s*[&,]\s*|\s+und\s+|\s+and\s+/).filter(function(g){return g.trim().length>2;});
    guests.forEach(function(g){
      g = g.trim();
      var pid = g.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').substring(0,30);
      if(!personMap[pid]){
        personMap[pid]={id:pid,name:g,role:ep.role||'',gender:ep.gender||'',
          generation:ep.generation||'',region:ep.region||'',hemisphere:ep.hemisphere||'',episodes:[]};
      }
      if(personMap[pid].episodes.indexOf(epId(ep))<0) personMap[pid].episodes.push(epId(ep));
    });
  });
  var persons = Object.values(personMap).filter(function(p){return p.episodes.length>0;})
    .sort(function(a,b){return a.name.localeCompare(b.name);});

  var list = persons.filter(function(p){
    if(hemF && p.hemisphere !== hemF) return false;
    if(search.trim()){
      var q=search.toLowerCase();
      return p.name.toLowerCase().indexOf(q)>=0||(p.role||'').toLowerCase().indexOf(q)>=0;
    }
    return true;
  });

  var gC={boomer:"#9a70c8",genx:"#3a9e8c",millennial:"#d46878",genz:"#d4a84b",mixed:"#9a8e80"};

  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>
      👥 Personen & Stimmen
      <span style={{color:P.light,fontSize:11,marginLeft:8}}>{list.length} Personen</span>
    </div>
    <input value={search} onChange={function(e){setSearch(e.target.value);}}
      placeholder="Name oder Rolle suchen…"
      style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,
        borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"Georgia,serif",
        outline:"none",boxSizing:"border-box",marginBottom:10}}/>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
      {[["nord","🌐 Norden","#7cb9c8"],["süd","🌍 Süden","#c87c50"],["mixed","↔ Gemischt","#9a8e80"]].map(function(h){
        var act=hemF===h[0];
        return <button key={h[0]} onClick={function(){setHemF(act?null:h[0]);}}
          style={{background:act?h[2]+"28":P.white,color:act?h[2]:P.mid,
            border:"1px solid "+(act?h[2]:P.creamDim),borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>
          {h[1]}
        </button>;
      })}
      {(search||hemF)&&<button onClick={function(){setSearch("");setHemF(null);}}
        style={{background:P.cream,color:P.mid,border:"1px solid "+P.creamDim,
          borderRadius:14,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>✕</button>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
      {list.map(function(p){
        var act=sel===p.id;
        var col=gC[p.generation]||P.teal;
        var eps=EPISODES.filter(function(e){return p.episodes.indexOf(epId(e))>=0;});
        return(
          <div key={p.id} onClick={function(){setSel(act?null:p.id);}}
            style={{background:act?col+"15":P.white,border:"1px solid "+(act?col+"60":P.creamDim),
              borderTop:"3px solid "+col,borderRadius:8,padding:"10px 12px",cursor:"pointer"}}>
            <div style={{color:P.dark,fontFamily:"Georgia,serif",fontSize:13,fontWeight:"bold",marginBottom:2}}>{p.name}</div>
            <div style={{color:P.mid,fontSize:10,marginBottom:5}}>{(p.role||"").substring(0,50)}</div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              <span style={{background:col+"20",color:col,fontSize:9,padding:"1px 5px",borderRadius:6}}>{p.generation||"?"}</span>
              <span style={{background:P.creamDim,color:P.mid,fontSize:9,padding:"1px 5px",borderRadius:6}}>{p.hemisphere||"?"}</span>
              <span style={{background:P.tealPale,color:P.teal,fontSize:9,padding:"1px 5px",borderRadius:6}}>{eps.length} Eintr.</span>
            </div>
            {act&&<div style={{marginTop:8,borderTop:"1px solid "+P.creamDim,paddingTop:6}}>
              {eps.slice(0,4).map(function(e){return(
                <div key={epId(e)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 0",borderBottom:"1px solid "+P.creamDim+"60"}}><span style={{color:P.teal,fontSize:11,cursor:"pointer",flex:1}} onClick={function(ev){ev.stopPropagation();props.onNavEp(e);}}>{(e.title||e.title_en||"").substring(0,36)}…</span>{e.yt&&<a href={"https://youtu.be/"+e.yt} target="_blank" rel="noreferrer" onClick={function(ev){ev.stopPropagation();}} style={{color:P.light,fontSize:9,textDecoration:"none",border:"1px solid "+P.creamDim,borderRadius:3,padding:"1px 4px",marginLeft:4,flexShrink:0}}>▶</a>}</div>
              );})}
              {eps.length>3&&<div style={{color:P.light,fontSize:10,marginTop:2}}>+{eps.length-3} weitere…</div>}
              <button onClick={function(ev){ev.stopPropagation();setSelPerson(p);}} style={{marginTop:5,background:"none",border:"1px solid "+col+"50",color:col,borderRadius:4,fontSize:10,padding:"2px 8px",cursor:"pointer",width:"100%"}}>Vollständiges Profil ({eps.length}) →</button>
            </div>}
          </div>
        );
      })}

  {selPerson&&<div style={{position:"fixed",top:0,right:0,bottom:0,width:Math.min(440,window.innerWidth),background:P.white,borderLeft:"3px solid "+(gC[selPerson.generation]||P.teal),boxShadow:"-4px 0 24px rgba(0,0,0,0.12)",zIndex:200,overflowY:"auto",padding:"20px 18px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div><div style={{color:gC[selPerson.generation]||P.teal,fontFamily:"Georgia,serif",fontSize:18,fontWeight:"bold"}}>{selPerson.name}</div>
      <div style={{color:P.mid,fontSize:11,marginTop:2}}>{selPerson.role}</div></div>
      <button onClick={function(){setSelPerson(null);}} style={{background:"none",border:"none",color:P.mid,cursor:"pointer",fontSize:22}}>x</button>
    </div>
    {(function(){
      var col=gC[selPerson.generation]||P.teal;
      var pEps=EPISODES.filter(function(e){return selPerson.episodes.indexOf(epId(e))>=0;});
      var customFrags=JSON.parse(localStorage.getItem("hk-custom-frags")||"[]");
      var allFrags=FRAGMENTS.concat(customFrags);
      var lastName=selPerson.name.split(" ").pop().toLowerCase();
      var relFrags=allFrags.filter(function(f){
        var inEps=pEps.some(function(ep){return (f.episodes||[]).indexOf(ep.id||epId(ep))>=0;});
        var inTitle=(f.title||"").toLowerCase().indexOf(lastName)>=0;
        return inEps||inTitle;
      }).slice(0,8);
      var merkFragen=JSON.parse(localStorage.getItem("hk-questions")||"[]")
        .filter(function(q){return q._glossar&&pEps.some(function(ep){return q.epIds.indexOf(epId(ep))>=0;});});
      return(<div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          <span style={{background:col+"18",color:col,fontSize:10,padding:"2px 8px",borderRadius:10}}>{selPerson.generation}</span>
          <span style={{background:P.creamDim,color:P.mid,fontSize:10,padding:"2px 8px",borderRadius:10}}>{selPerson.hemisphere}</span>
          <span style={{background:P.tealPale,color:P.teal,fontSize:10,padding:"2px 8px",borderRadius:10}}>{pEps.length} Episoden</span>
          {relFrags.length>0&&<span style={{background:"#9a70c820",color:"#9a70c8",fontSize:10,padding:"2px 8px",borderRadius:10}}>{relFrags.length} Glossar</span>}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:P.light,fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Episoden</div>
          {pEps.map(function(e){
            var c=sc((e.spheres&&e.spheres[0])||null);
            return(<div key={epId(e)} style={{padding:"6px 0",borderBottom:"1px solid "+P.creamDim+"60"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={function(){setSelPerson(null);props.onNavEp(e);}}>
                  <div style={{color:c,fontSize:12,fontWeight:"bold"}}>{e.guest||e.title}</div>
                  <div style={{color:P.mid,fontSize:10}}>{(e.title||"").substring(0,55)}</div>
                </div>
                {e.yt&&<a href={"https://youtu.be/"+e.yt} target="_blank" rel="noreferrer" style={{color:P.teal,fontSize:10,textDecoration:"none",border:"1px solid "+P.teal+"30",borderRadius:4,padding:"2px 6px",marginLeft:6,flexShrink:0}}>YT</a>}
              </div>
            </div>);
          })}
        </div>
        {relFrags.length>0&&<div style={{marginBottom:14}}>
          <div style={{color:P.light,fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Glossar-Fragmente</div>
          {relFrags.map(function(f){
            var ft=FRAGMENT_TYPES.find(function(t){return t.id===f.type;});
            return(<div key={f.id} style={{padding:"5px 8px",background:P.cream,borderRadius:4,marginBottom:4,borderLeft:"2px solid "+(ft?ft.color:P.teal),fontSize:11,color:P.dark}}>
              {ft?ft.icon:""} {f.title.substring(0,65)}{f.title.length>65?"...":""}
            </div>);
          })}
        </div>}
        {merkFragen.length>0&&<div style={{marginBottom:14}}>
          <div style={{color:P.light,fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Werkliste-Fragen</div>
          {merkFragen.map(function(q){return(
            <div key={q.id} style={{padding:"5px 8px",background:P.tealPale,borderRadius:4,marginBottom:4,borderLeft:"2px solid "+P.teal,fontSize:11,color:P.dark}}>
              {q.text.substring(0,65)}...
            </div>
          );})}        </div>}
        {props.onBookmark&&<button onClick={function(){pEps.forEach(function(e){props.onBookmark(e);});setSelPerson(null);}} style={{background:P.tealPale,color:P.teal,border:"1px solid "+P.teal+"50",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",marginTop:8}}>Alle in Werkliste</button>}
      </div>);
    })()}
  </div>}
    </div>
  </div>);
}


function Glossar(props) {
  var [activeType, setActiveType] = useState(null);
  var [search, setSearch] = useState("");
  var [selectedFrag, setSelectedFrag] = useState(null);
  var [showOwn, setShowOwn] = useState(false);
  var [showLive, setShowLive] = useState(false);
  // Load custom fragments + Werkliste questions marked as Glossar
  var customFrags = JSON.parse(localStorage.getItem("hk-custom-frags")||"[]");
  var merklisteFragen = JSON.parse(localStorage.getItem("hk-questions")||"[]")
    .filter(function(q){return q._glossar;})
    .map(function(q){
      var qZitate=JSON.parse(localStorage.getItem("hk-zitate")||"[]")
        .filter(function(z){return q.epIds.indexOf(z.id)>=0;});
      var eps=EPISODES.filter(function(ep){return q.epIds.indexOf(epId(ep))>=0;});
      return {
        id:"mq-"+q.id, type:"frage",
        title:q.text,
        desc:qZitate.length>0?qZitate[0].text.substring(0,120):"Frage aus Werkliste",
        keywords:eps.slice(0,3).map(function(ep){return ep.guest||"";}),
        episodes:eps.map(function(ep){return ep.id||epId(ep);}),
        quote_en:qZitate.length>0?qZitate[0].text.substring(0,150):null,
        _fromWerkliste:true, _qId:q.id,
        _zitate:qZitate,
      };
    });
  var allFragments = FRAGMENTS.concat(customFrags).concat(merklisteFragen);

  var filtered = allFragments.filter(function(f){
    if(showOwn && !f._custom && !f._fromWerkliste) return false;
    if(showLive && !f._fromWerkliste) return false;
    if(activeType && f.type !== activeType) return false;
    if(search.trim()){var q=search.toLowerCase();return f.title.toLowerCase().indexOf(q)>=0||f.desc.toLowerCase().indexOf(q)>=0;}
    return true;
  });
  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>📚 Glossar & Fragmente
      <span style={{color:P.light,fontSize:11,marginLeft:8}}>{filtered.length} Fragmente{customFrags.length>0&&" ("+customFrags.length+" eigene)"}</span>
    </div>
    <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Fragment suchen…"
      style={{width:"100%",background:P.white,color:P.dark,border:"1px solid "+P.creamDim,borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
      {FRAGMENT_TYPES.map(function(t){var act=activeType===t.id;return(
        <button key={t.id} onClick={function(){setActiveType(act?null:t.id);}}

// ─── VOLLTEXT-SUCHE ───────────────────────────────────────────────────────
function VolltextSuche(props) {
  var [query, setQuery]     = useState(function(){return loadLS("hk-vt-query","");});
  var [results, setResults] = useState([]);
  var [searching, setSearching] = useState(false);
  var [savePopup, setSavePopup] = useState(null);
  var [onlyVTT, setOnlyVTT] = useState(false);
  var [history, setHistory]   = useState(function(){return loadLS("hk-vt-history",[]);});

  useEffect(function(){saveLS("hk-vt-query",query);},[query]);
  useEffect(function(){saveLS("hk-vt-history",history);},[history]);

  // Load transcripts + re-run last search
  useEffect(function(){
    props.onLoad && props.onLoad();
  },[]);
  useEffect(function(){
    if(query.trim() && props.transcripts && results.length===0) doSearch(query);
  },[props.transcripts]);

  function doSearch(q) {
    if(!q.trim() || !props.transcripts) return;
    setSearching(true);
    if(q.trim().length>2){
      setHistory(function(prev){
        var f=prev.filter(function(h){return h.q!==q.trim();});
        return [{q:q.trim(),ts:Date.now()}].concat(f).slice(0,15);
      });
    }
    var hits = [];
    var qLow = q.toLowerCase();
    var words = qLow.split(/\s+/).filter(function(w){return w.length>2;});
    var multiWord = words.length > 1;

    Object.keys(props.transcripts).forEach(function(ytId){
      var tr = props.transcripts[ytId];
      var text = tr.text || '';
      var textLow = text.toLowerCase();

      // For multi-word: ALL words must appear in the transcript
      if(onlyVTT && !tr.has_timestamps) return;
      if(multiWord){
        var allPresent = words.every(function(w){return textLow.indexOf(w)>=0;});
        if(!allPresent) return;
      }

      // Find positions per word
      var positionsPerWord = {};
      var allPositions = [];
      words.forEach(function(w){
        positionsPerWord[w] = [];
        var pos = 0;
        while(true){
          var idx = textLow.indexOf(w, pos);
          if(idx<0) break;
          positionsPerWord[w].push(idx);
          allPositions.push(idx);
          pos = idx+1;
        }
      });

      if(allPositions.length===0) return;

      // For multi-word: prefer snippets where words are close together
      var snippetPositions = [];
      if(multiWord){
        // Find positions where all words appear within 800 chars of each other
        var firstWordPos = positionsPerWord[words[0]] || [];
        firstWordPos.forEach(function(startPos){
          var window = textLow.slice(startPos, startPos+800);
          var allInWindow = words.every(function(w){return window.indexOf(w)>=0;});
          if(allInWindow) snippetPositions.push(startPos);
        });
        // If no close co-occurrences, fall back to first occurrence of each word
        if(snippetPositions.length===0){
          words.forEach(function(w){
            if(positionsPerWord[w].length>0) snippetPositions.push(positionsPerWord[w][0]);
          });
        }
      } else {
        snippetPositions = allPositions;
      }

      snippetPositions.sort(function(a,b){return a-b;});

      // Build snippets, deduplicate overlapping
      var snippets = [];
      var lastEnd = -1;
      snippetPositions.forEach(function(pos){
        if(pos < lastEnd) return;
        var start = Math.max(0, pos-150);
        var end   = Math.min(text.length, pos+550);
        snippets.push({start:start, end:end, text:text.slice(start,end)});
        lastEnd = end;
      });

      // Score: for multi-word, boost co-occurrences
      var score = allPositions.length;
      if(multiWord) score = snippetPositions.length * 10 + allPositions.length;

      var ep = EPISODES.find(function(e){return e.yt===ytId;});
      hits.push({
        ytId: ytId,
        ep: ep || null,
        guest: tr.guest,
        title: tr.title,
        matchCount: allPositions.length,
        coOccurrences: multiWord ? snippetPositions.length : null,
        score: score,
        snippets: snippets.slice(0,3),
      });
    });

    // Sort by score (co-occurrences first for multi-word)
    hits.sort(function(a,b){return b.score-a.score;});
    // No artificial limit - show all results that match
    setResults(hits);
    setSearching(false);
  }

  function highlight(text, words) {
    if(!words||words.length===0) return text;
    var parts = text.split(new RegExp('('+words.map(function(w){
      return w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    }).join('|')+')','gi'));
    return parts.map(function(p,i){
      var isMatch = words.some(function(w){return p.toLowerCase()===w.toLowerCase();});
      return isMatch
        ? <mark key={i} style={{background:"#f5e8c8",color:"#2c2820",borderRadius:2,padding:"0 1px"}}>{p}</mark>
        : p;
    });
  }

  var words = query.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});

  return(<div>
    <div style={{color:P.teal,fontFamily:"Georgia,serif",fontSize:16,marginBottom:8}}>
      📜 Volltext-Suche
      {props.loading&&<span style={{color:P.light,fontSize:11,marginLeft:8}}>Transkripte laden…</span>}
      {props.transcripts&&<span style={{color:P.light,fontSize:11,marginLeft:8}}>
        {Object.keys(props.transcripts).length} Transkripte geladen
      </span>}
    </div>

    {!props.transcripts&&!props.loading&&<div style={{background:P.tealPale,border:"1px solid "+P.teal+"40",
      borderRadius:8,padding:"16px 20px",marginBottom:12,color:P.tealDim,fontSize:12}}>
      ⏳ Transkripte werden geladen… bitte einen Moment warten.
    </div>}

    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <input value={query} onChange={function(e){setQuery(e.target.value);}}
        onKeyDown={function(e){if(e.key==="Enter")doSearch(query);}}
        placeholder="Volltext suchen… (Enter)"
        disabled={!props.transcripts}
        style={{flex:1,background:P.white,color:P.dark,border:"1px solid "+P.creamDim,
          borderRadius:6,padding:"10px 14px",fontSize:13,fontFamily:"Georgia,serif",
          outline:"none",opacity:props.transcripts?1:0.5}}/>
      <button onClick={function(){doSearch(query);}} disabled={!props.transcripts||!query.trim()}
        style={{background:P.teal,color:P.white,border:"none",borderRadius:6,
          padding:"10px 18px",fontSize:13,cursor:"pointer",opacity:props.transcripts?1:0.5}}>
        Suchen
      </button>
    </div>
    {history.length>0&&<div style={{marginBottom:8,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{color:P.light,fontSize:10}}>🕐</span>
      {history.slice(0,10).map(function(h){
        var active=query===h.q;
        return <button key={h.ts}
          onClick={function(){setQuery(h.q);doSearch(h.q);}}
          style={{background:active?P.tealPale:P.cream,color:active?P.teal:P.mid,
            border:"1px solid "+(active?P.teal+"50":P.creamDim),
            borderRadius:10,padding:"2px 8px",fontSize:10,cursor:"pointer"}}>{h.q}</button>;
      })}
      <button onClick={function(){setHistory([]);}} style={{background:"none",border:"none",color:P.light,fontSize:10,cursor:"pointer"}}>✕</button>
    </div>}
    {props.transcripts&&<div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
      <button onClick={function(){setOnlyVTT(!onlyVTT);if(!onlyVTT)doSearch(query);}
        } title="Nur Episoden mit sekundengenauen Zeitmarken"
        style={{background:onlyVTT?P.teal:P.white,color:onlyVTT?P.white:P.mid,
          border:"1px solid "+(onlyVTT?P.teal:P.creamDim),borderRadius:14,
          padding:"3px 10px",fontSize:11,cursor:"pointer"}}>⏱ Nur mit Zeitmarken</button>
      {props.transcripts&&<span style={{color:P.light,fontSize:10}}>
        {Object.values(props.transcripts).filter(function(t){return t.has_timestamps;}).length} von {Object.keys(props.transcripts).length} Transkripten haben exakte Zeitmarken
      </span>}
    </div>}

    {results.length>0&&<div style={{color:P.light,fontSize:11,marginBottom:10}}>
      {results.length} Treffer
      {words.length>1&&" · nur Episoden mit allen "+words.length+" Wörtern"}
      {results[0]&&results[0].coOccurrences!=null&&" · sortiert nach Häufigkeit der Wortkombination"}
      {" · Klicke auf eine Textstelle zum Speichern"}
    </div>}

    {/* Save popup */}
    {savePopup&&<div style={{position:"fixed",top:savePopup.y,left:savePopup.x,
      background:P.dark,color:P.white,borderRadius:8,padding:"8px 4px",
      zIndex:999,display:"flex",gap:4,boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
      <button onClick={function(){
        navigator.clipboard&&navigator.clipboard.writeText(savePopup.text);
        setSavePopup(null);
      }} style={{background:"none",border:"none",color:P.white,cursor:"pointer",
        padding:"4px 8px",fontSize:11,borderRadius:4}}>📋 Kopieren</button>
      <button onClick={function(){
        if(props.onSaveZitat){
          var ep=savePopup.ep;
          // Look up exact timestamp from timing data if available
          var estSecs=null;
          if(savePopup.charPos!=null&&props.transcripts){
            var tr=props.transcripts[savePopup.ytId];
            if(tr&&tr.timing&&tr.timing.length>0){
              // Binary search for closest timing entry
              var timing=tr.timing;
              var lo=0,hi=timing.length-1,best=0;
              while(lo<=hi){
                var mid=Math.floor((lo+hi)/2);
                if(timing[mid][0]<=savePopup.charPos){best=mid;lo=mid+1;}
                else hi=mid-1;
              }
              // Go back a few segments to land before the quote starts
              var adjustedBest = Math.max(0, best-1);
              estSecs=Math.round(timing[adjustedBest][1]);
            } else if(savePopup.charPos){
              estSecs=Math.round(savePopup.charPos/11.67);
            }
          }
          var ytUrl=ep&&ep.yt?"https://youtu.be/"+ep.yt+(estSecs!=null?"?t="+estSecs:""):"";
          props.onSaveZitat({
            id:"z-"+Date.now(),
            text:savePopup.text,
            ytId:savePopup.ytId,
            guest:savePopup.guest||"",
            title:savePopup.title||"",
            epId:ep?epId(ep):null,
            youtube:ytUrl,
            timestamp:estSecs,
            exactTimestamp:!!(savePopup.charPos&&props.transcripts&&
              props.transcripts[savePopup.ytId]&&
              props.transcripts[savePopup.ytId].timing),
            savedAt:new Date().toISOString(),
          });
        }
        setSavePopup(null);
      }} style={{background:"none",border:"none",color:P.white,cursor:"pointer",
        padding:"4px 8px",fontSize:11,borderRadius:4}}>🔖 Werkliste</button>
      <button onClick={function(){setSavePopup(null);}}
        style={{background:"none",border:"none",color:P.light,cursor:"pointer",
          padding:"4px 8px",fontSize:14}}>×</button>
    </div>}

    <div style={{maxHeight:600,overflowY:"auto"}}>
      {results.map(function(hit){
        var col = hit.ep ? sc((hit.ep.spheres&&hit.ep.spheres[0])||null) : P.teal;
        return(<div key={hit.ytId} style={{background:P.white,border:"1px solid "+P.creamDim,
          borderLeft:"4px solid "+col,borderRadius:6,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{color:col,fontFamily:"Georgia,serif",fontSize:14,fontWeight:"bold",cursor:"pointer"}}
                onClick={function(){if(hit.ep)props.onNavEp(hit.ep);}}>
                {hit.guest||hit.title}
              </div>
              <div style={{color:P.mid,fontSize:11}}>{hit.title.substring(0,70)}</div>
            </div>
            <span style={{background:P.creamDim,color:P.mid,fontSize:10,
              padding:"2px 8px",borderRadius:10,flexShrink:0,marginLeft:8}}>
              {hit.matchCount} Treffer{hit.coOccurrences!=null&&hit.coOccurrences>0?" · "+hit.coOccurrences+"× zusammen":""}
            </span>
            {props.transcripts&&props.transcripts[hit.ytId]&&props.transcripts[hit.ytId].has_timestamps&&
              <span style={{background:P.tealPale,color:P.teal,fontSize:9,
                padding:"1px 6px",borderRadius:8,marginLeft:4}}>⏱ Zeitmarken</span>}
          </div>
          {hit.snippets.map(function(snip,si){
            return(<div key={si}
              onClick={function(e){
                var sel=window.getSelection();
                var text=sel&&sel.toString().trim();
                if(text&&text.length>5){
                  setSavePopup({text:text,ep:hit.ep,ytId:hit.ytId,guest:hit.guest,title:hit.title,
                    charPos:snip.start+150,  // approx position of match within snippet
                    x:Math.min(e.clientX,window.innerWidth-200),

                }
              }}
              style={{background:P.cream,borderRadius:4,padding:"8px 10px",

              <span style={{color:P.light,fontSize:9,display:"block",marginBottom:3}}>
                …Stelle {si+1}…

            </div>);
          })}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            {hit.ep&&<button onClick={function(){props.onNavEp(hit.ep);}}
              style={{background:"none",border:"1px solid "+col+"50",color:col,
                borderRadius:4,padding:"2px 8px",fontSize:10,cursor:"pointer"}}>
              → Steckbrief
            </button>}
            <a href={"https://youtu.be/"+(hit.yt||hit.ytId)} target="_blank" rel="noreferrer"
              style={{color:P.light,fontSize:10,padding:"2px 8px",border:"1px solid "+P.creamDim,

        Keine Treffer in den Transkripten.

function GraphGefiltert(props) {

  var [selSphere, setSelSphere] = useState(null);
  var [maxNodes, setMaxNodes] = useState(40);
  var [resetKey, setResetKey] = useState(0);

  var allFelder = [];
  EPISODES.forEach(function(ep){ (ep.felder||[]).forEach(function(f){ if(allFelder.indexOf(f)<0) allFelder.push(f); }); });

  var filtered = EPISODES.filter(function(ep){
    if(selSphere && (ep.spheres||[]).indexOf(selSphere)<0) return false;
    if(selFelder.length>0 && !selFelder.some(function(f){return (ep.felder||[]).indexOf(f)>=0;})) return false;
    if(searchQ.trim()){
      var q=searchQ.toLowerCase();
      return (ep.guest||"").toLowerCase().indexOf(q)>=0 ||
             (ep.title||"").toLowerCase().indexOf(q)>=0 ||
             (ep.keywords||[]).some(function(k){return k.toLowerCase().indexOf(q)>=0;});

    return selFelder.length>0 || selSphere;

  var hasFilter = selFelder.length>0 || selSphere || searchQ.trim();

            borderRadius:6,padding:"6px 10px",fontSize:12,fontFamily:"Georgia,serif",outline:"none"}}/>
        <select value={maxNodes} onChange={function(e){setMaxNodes(parseInt(e.target.value));}}

          style={{background:P.tealPale,color:P.teal,border:"1px solid "+P.teal+"40",
            borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>✕ Filter</button>}

            style={{background:act?P.tealPale:P.white,color:act?P.teal:P.light,
              border:"1px solid "+(act?P.teal+"50":P.creamDim),borderRadius:10,

    "Digitalität":"#5a8ecc","Fairer Handel & regenerative Wirtschaft":"#c87c50","Frieden & Abrüstung":"#8e8e70"};

  var allFelder = Object.keys(feldColors);

  var eps = EPISODES.filter(function(ep){
    if(selFelder.length>0 && !selFelder.some(function(f){return (ep.felder||[]).indexOf(f)>=0;})) return false;
    if(searchQ.trim()){
      var q=searchQ.toLowerCase();
      return (ep.guest||"").toLowerCase().indexOf(q)>=0||(ep.title||"").toLowerCase().indexOf(q)>=0;
    }
    return true;

    eps = eps.slice().sort(function(a,b){
      return (a.felder||[""])[0].localeCompare((b.felder||[""])[0]);

    eps = eps.slice().sort(function(a,b){return (a.generation||"").localeCompare(b.generation||"");});
  } else if(sortBy==="hemisphere"){
    eps = eps.slice().sort(function(a,b){return (a.hemisphere||"").localeCompare(b.hemisphere||"");});
  }

  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>

          borderRadius:6,padding:"5px 8px",fontSize:11}}>

      {allFelder.map(function(f){var act=selFelder.indexOf(f)>=0;var col=feldColors[f]||P.teal;return(
        <button key={f} onClick={function(){setSelFelder(function(prev){return act?prev.filter(function(x){return x!==f;}):[...prev,f];});}}
          style={{background:act?col+"20":P.white,color:act?col:P.light,border:"1px solid "+(act?col:P.creamDim),
            borderRadius:10,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>{f.substring(0,18)}</button>
      );})}
    </div>
    <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse",fontSize:10,width:"100%"}}>
        <thead>
          <tr>
            <th style={{background:P.cream,padding:"6px 8px",textAlign:"left",color:P.mid,fontSize:10,position:"sticky",left:0,zIndex:1}}>
              Person / Titel ({eps.length})

            {allFelder.map(function(f){var col=feldColors[f]||P.teal;return(
              <th key={f} style={{background:P.cream,padding:"4px 6px",color:col,fontSize:9,
                writingMode:"vertical-lr",transform:"rotate(180deg)",
                maxWidth:24,overflow:"hidden",verticalAlign:"bottom",whiteSpace:"nowrap"}}>
                {f.substring(0,18)}

// ── F: LISTE ─────────────────────────────────────────────
// Durchsuchbare Tabelle mit Verbindungsinfos
function GraphListe(props) {
  var [searchQ, setSearchQ] = useState("");
  var [sortBy, setSortBy] = useState("connections");
  var [selFelder, setSelFelder] = useState([]);

  // Precompute connections count per episode
  var connMap = {};
  EPISODES.forEach(function(a){
    var id=epId(a), count=0;
    EPISODES.forEach(function(b){
      if(a===b) return;
      var shared=(a.spheres||[]).filter(function(s){return (b.spheres||[]).indexOf(s)>=0;}).length
               +(a.felder||[]).filter(function(f){return (b.felder||[]).indexOf(f)>=0;}).length;
      if(shared>=3) count++;
    });
    connMap[id]=count;
  });

  var allFelder = [];
  EPISODES.forEach(function(ep){(ep.felder||[]).forEach(function(f){if(allFelder.indexOf(f)<0)allFelder.push(f);});});

  var eps = EPISODES.filter(function(ep){
    if(selFelder.length>0 && !selFelder.some(function(f){return (ep.felder||[]).indexOf(f)>=0;})) return false;
    if(!searchQ.trim()) return true;
    var q=searchQ.toLowerCase();
    return (ep.guest||"").toLowerCase().indexOf(q)>=0 ||
           (ep.title||"").toLowerCase().indexOf(q)>=0 ||
           (ep.felder||[]).some(function(f){return f.toLowerCase().indexOf(q)>=0;}) ||
           (ep.keywords||[]).some(function(k){return k.toLowerCase().indexOf(q)>=0;});
  });

  if(sortBy==="connections") eps=eps.slice().sort(function(a,b){return (connMap[epId(b)]||0)-(connMap[epId(a)]||0);});
  else if(sortBy==="alpha") eps=eps.slice().sort(function(a,b){return (a.guest||a.title||"").localeCompare(b.guest||b.title||"");});
  else if(sortBy==="felder") eps=eps.slice().sort(function(a,b){return ((a.felder||[""])[0]).localeCompare((b.felder||[""])[0]);});

  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
      <input value={searchQ} onChange={function(e){setSearchQ(e.target.value);}}
        placeholder="Person, Titel, Feld, Keyword…"
        style={{flex:1,minWidth:160,background:P.white,color:P.dark,border:"1px solid "+P.creamDim,
          borderRadius:6,padding:"6px 10px",fontSize:12,fontFamily:"Georgia,serif",outline:"none"}}/>
      <select value={sortBy} onChange={function(e){setSortBy(e.target.value);}}
        style={{background:P.white,color:P.mid,border:"1px solid "+P.creamDim,
          borderRadius:6,padding:"5px 8px",fontSize:11}}>
        <option value="connections">↓ Verbindungen</option>
        <option value="alpha">A–Z Name</option>
        <option value="felder">Feld</option>
      </select>
    </div>
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
      {allFelder.map(function(f){var act=selFelder.indexOf(f)>=0;return(
        <button key={f} onClick={function(){setSelFelder(function(prev){return act?prev.filter(function(x){return x!==f;}):[...prev,f];});}}
          style={{background:act?P.tealPale:P.white,color:act?P.teal:P.light,
            border:"1px solid "+(act?P.teal+"50":P.creamDim),
            borderRadius:10,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>{f.substring(0,20)}</button>
      );})}
    </div>
    <div style={{color:P.light,fontSize:11,marginBottom:6}}>
      {eps.length} von {EPISODES.length} Einträgen
    </div>
    <div style={{maxHeight:600,overflowY:"auto"}}>
      {eps.map(function(ep){
        var active=props.selected&&epId(props.selected)===epId(ep);
        var inMerk=props.merkliste&&props.merkliste.indexOf(epId(ep))>=0;
        var conns=connMap[epId(ep)]||0;
        var col=sc((ep.spheres&&ep.spheres[0])||null);
        return(<div key={epId(ep)} onClick={function(){props.onSelect(ep);}}
          style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
            background:active?P.tealPale:P.white,cursor:"pointer",
            borderBottom:"1px solid "+P.creamDim+"60",borderLeft:"3px solid "+(active?col:"transparent")}}>
          <div style={{flex:1}}>
            <div style={{color:active?P.teal:P.dark,fontSize:12,fontWeight:active?"bold":"normal"}}>
              {(ep.title||ep.title_en||ep.guest||"").substring(0,55)}
            </div>
            <div style={{color:P.light,fontSize:10,marginTop:1}}>
              {ep.guest&&ep.guest.substring(0,30)} · {(ep.felder||[])[0]||""}
            </div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
            <span style={{background:col+"20",color:col,fontSize:9,padding:"1px 5px",borderRadius:8}}>
              {conns} ↔
            </span>
            {inMerk&&<span style={{color:P.teal,fontSize:11}}>🔖</span>}
            {ep.yt&&<button onClick={function(e){e.stopPropagation();props.onNavEp(ep);}}
              style={{background:"none",border:"1px solid "+P.creamDim,color:P.light,
                borderRadius:4,fontSize:10,padding:"1px 6px",cursor:"pointer"}}>→</button>}
          </div>
        </div>);
      })}
    </div>
  </div>);
}


// ─── STORAGE HELPERS ─────────────────────────────────────────────────────
function loadLS(key, fallback) {
  try { var v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } 
  catch(e) { return fallback; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function App(){
  var [epsLoaded,setEpsLoaded]=useState(EPISODES_LOADED);
  var [loadError,setLoadError]=useState(null);
  useEffect(function(){
    window._hkForceUpdate=function(){
      setEpsLoaded(EPISODES_LOADED);
      if(window._hkLoadError) setLoadError(window._hkLoadError);
    };
    if(EPISODES_LOADED) setEpsLoaded(true);
    // Polling fallback every 200ms
    var poll=setInterval(function(){
      if(EPISODES_LOADED){setEpsLoaded(true);clearInterval(poll);}
      if(window._hkLoadError){setLoadError(window._hkLoadError);clearInterval(poll);}
    },200);
    return function(){window._hkForceUpdate=null;clearInterval(poll);};
  },[]);
  var [merkliste,setMerkliste]=useState(function(){return loadLS("hk-merkliste",[]);});
  var [zitate,setZitate]=useState(function(){return loadLS("hk-zitate",[]);});
  var [transcripts,setTranscripts]=useState(null);
  var [transcriptsLoading,setTranscriptsLoading]=useState(false);


  // ── SYNC HELPERS ─────────────────────────────────────────────────
  function exportSession(){
    var data={
      merkliste:merkliste,
      zitate:zitate,
      discoveries:discoveries,
      questions:JSON.parse(localStorage.getItem("hk-questions")||"[]"),
      comments:JSON.parse(localStorage.getItem("hk-comments")||"{}"),
      customFrags:JSON.parse(localStorage.getItem("hk-custom-frags")||"[]"),
      vtQuery:localStorage.getItem("hk-vt-query")||"",
      vtHistory:JSON.parse(localStorage.getItem("hk-vt-history")||"[]"),
      exportedAt:new Date().toISOString(),
      version:2,
    };
    var json=JSON.stringify(data);
    var blob=new Blob([json],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="humus-session-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
  }

  function importSession(file){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=JSON.parse(e.target.result);
        if(data.merkliste) setMerkliste(data.merkliste);
        if(data.zitate) setZitate(data.zitate);
        if(data.discoveries) setDiscoveries(data.discoveries);
        if(data.questions) localStorage.setItem("hk-questions",JSON.stringify(data.questions));
        if(data.comments) localStorage.setItem("hk-comments",JSON.stringify(data.comments));
        if(data.customFrags) localStorage.setItem("hk-custom-frags",JSON.stringify(data.customFrags));
        if(data.vtQuery) localStorage.setItem("hk-vt-query",data.vtQuery);
        if(data.vtHistory) localStorage.setItem("hk-vt-history",JSON.stringify(data.vtHistory));
        alert("✅ Sitzung importiert! Seite wird neu geladen.");
        window.location.reload();
      } catch(err){alert("❌ Import fehlgeschlagen: "+err.message);}
    };
    reader.readAsText(file);
  }

  function shareSession(){
    var data={
      m:merkliste,
      z:zitate.map(function(z){return{id:z.id,text:z.text.substring(0,200),guest:z.guest||"",title:z.title||"",youtube:z.youtube||"",timestamp:z.timestamp,ytId:z.ytId};}),
      q:JSON.parse(localStorage.getItem("hk-questions")||"[]"),
    };
    var json=JSON.stringify(data);
    var compressed=btoa(encodeURIComponent(json));
    var url=window.location.origin+window.location.pathname+"?s="+compressed;
    if(url.length>8000){
      alert("⚠ Zu viele Daten für URL-Teilen ("+url.length+" Zeichen).\nBitte Export/Import nutzen.");
      return;
    }
    navigator.clipboard&&navigator.clipboard.writeText(url).then(function(){
      alert("✅ Link kopiert! ("+url.length+" Zeichen)\nAuf anderem Gerät öffnen um Sitzung wiederherzustellen.");
    }).catch(function(){prompt("Link kopieren:",url);});
  }

  // Load shared session from URL on startup
  useEffect(function(){
    var params=new URLSearchParams(window.location.search);
    var s=params.get("s");
    if(!s) return;
    try{
      var data=JSON.parse(decodeURIComponent(atob(s)));
      if(data.m) setMerkliste(data.m);
      if(data.z) setZitate(data.z);
      if(data.q) localStorage.setItem("hk-questions",JSON.stringify(data.q));
      // Remove ?s= from URL without reload
      window.history.replaceState({},"",window.location.pathname);
      setTimeout(function(){alert("✅ Geteilte Sitzung geladen!");},500);
    } catch(e){console.log("Session load error:",e);}
  },[]);

  function loadTranscripts(){
    if(transcripts||transcriptsLoading) return;
    setTranscriptsLoading(true);
    fetch("transcripts.json")
      .then(function(r){return r.json();})
      .then(function(data){setTranscripts(data);setTranscriptsLoading(false);})
      .catch(function(){setTranscriptsLoading(false);});
  }
  var [discoveries,setDiscoveries]=useState(function(){return loadLS("hk-discoveries",[]);});
  var [multiSel,setMultiSel]=useState([]);  // array of epIds for multi-select
  var [graphSubTab,setGraphSubTab]=useState("gefiltert");
  var [graphSearchQ,setGraphSearchQ]=useState("");
  var [graphSize,setGraphSize]=useState(60); // max nodes in graph
  var [pins,setPins]=useState(function(){return loadLS("hk-pins",[]);});
  var [tab,setTab]=useState("kompass");
  var [sphere,setSphere]=useState(null);
  var [felder,setFelder]=useState(null);
  var [vennFilter,setVennFilter]=useState(null);
  var [filterMode,setFilterMode]=useState("all");
  var [selected,setSelected]=useState(null);
  var [search,setSearch]=useState("");
  var [navHistory,setNavHistory]=useState([]);
  var [gFilters,setGFilters]=useState(defaultFilters());
  var [resetKey,setResetKey]=useState(0);

  function handleGFilter(field,val){setGFilters(function(f){var n=Object.assign({},f);if(field==="sphere"){n.sphere=val;}else if(field==="alphaMode"){n.alphaMode=val;}else{n[field]=toggleArr(f[field]||[],val);}return n;});}
  function navigateTo(nt,ns){setNavHistory(function(h){return h.concat([{tab:tab,selected:selected}]);});setTab(nt);setSelected(ns||null);}
  function goBack(){if(navHistory.length===0)return;var p=navHistory[navHistory.length-1];setNavHistory(function(h){return h.slice(0,-1);});setTab(p.tab);setSelected(p.selected);}
  // Persist to localStorage on change
  useEffect(function(){saveLS("hk-merkliste",merkliste);},[merkliste]);
  useEffect(function(){saveLS("hk-zitate",zitate);},[zitate]);
  useEffect(function(){saveLS("hk-discoveries",discoveries);},[discoveries]);
  useEffect(function(){saveLS("hk-pins",pins);},[pins]);

  function handleNavEp(ep){navigateTo("kompass",ep);}
  function saveZitat(zitat){
    setZitate(function(prev){
      // avoid duplicates
      if(prev.find(function(z){return z.id===zitat.id;})) return prev;
      return prev.concat([zitat]);
    });
  }
  function removeZitat(id){setZitate(function(prev){return prev.filter(function(z){return z.id!==id;});});}
  async function toggleBookmark(ep){var id=epId(ep);await setMerkliste(function(p){return p.indexOf(id)>=0?p.filter(function(x){return x!==id;}):p.concat([id]);});}
  async function saveDiscovery(disc){await setDiscoveries(function(p){return p.concat([disc]);});}
  async function shareDiscovery(disc){var pin={id:String(Date.now()),authorName:"Anonym",title:disc.title,query:disc.query,response:disc.response,createdAt:new Date().toISOString()};await setPins(function(p){return p.concat([pin]);});navigateTo("community",null);}

  var _fns=[];
  if(sphere)_fns.push(function(e){return e.spheres.indexOf(sphere)>=0;});
  if(felder)_fns.push(function(e){return e.felder.indexOf(felder)>=0;});
  if(vennFilter)_fns.push(function(e){return e.vennFields&&e.vennFields.indexOf(vennFilter)>=0;});
  if(search.trim()){var _sq=search.toLowerCase();_fns.push(function(e){return (e.guest&&e.guest.toLowerCase().indexOf(_sq)>=0)||e.title.toLowerCase().indexOf(_sq)>=0||e.keywords.some(function(k){return k.toLowerCase().indexOf(_sq)>=0;})||(e.quote&&e.quote.toLowerCase().indexOf(_sq)>=0)||e.felder.some(function(f){return f.toLowerCase().indexOf(_sq)>=0;});});}
  var filtered=_fns.length===0?EPISODES:filterMode==="all"?EPISODES.filter(function(e){return _fns.every(function(f){return f(e);});}):filterMode==="any"?EPISODES.filter(function(e){return _fns.some(function(f){return f(e);});}):EPISODES.map(function(e){return{ep:e,s:_fns.filter(function(f){return f(e);}).length};}).filter(function(r){return r.s>0;}).sort(function(a,b){return b.s-a.s;}).map(function(r){return r.ep;});
  var gFiltered=applyGraphFilters(EPISODES,gFilters,filterMode);
  function selToggle(ep){setSelected(function(s){return s&&epId(s)===epId(ep)?null:ep;});}
  var TABS=[["kompass","🧭 Kompass"],["graph","🕸 Graph"],["suche","🔍 Suche"],["ki","🌿 KI-Kompass"],["smartsuche","🔎 Smart-Suche"],["volltextsuche","📜 Volltext"],["personen","👥 Personen"],["glossar","📚 Glossar"],["merkliste","🔖 Werkliste"+(merkliste.length>0?" ("+merkliste.length+")":"")],["community","📌 Netzwerk"+(pins.length>0?" ("+pins.length+")":"")]];
  if(loadError) return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16,fontFamily:"Georgia,serif"}}>
    <div style={{color:"#d46878",fontSize:16}}>⚠ {loadError}</div>
    <button onClick={function(){window.location.reload();}} style={{background:"#3a9e8c",color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",fontSize:13,cursor:"pointer"}}>Seite neu laden</button>
  </div>);
  if(!epsLoaded) return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:12,fontFamily:"Georgia,serif"}}>
    <div style={{color:"#3a9e8c",fontSize:22}}>🌱</div>
    <div style={{color:"#3a9e8c",fontSize:16}}>Humus-Kompass lädt…</div>
    <div style={{color:"#9a8e80",fontSize:11}}>Episodendaten werden geladen</div>
  </div>);
  return(<div style={{background:P.cream,color:P.dark,minHeight:"100vh",fontFamily:"Georgia,serif",position:"relative"}}>
    <div style={{background:P.white,borderBottom:"2px solid rgba(58,158,140,0.12)",padding:"12px 20px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
        <button onClick={goBack} disabled={navHistory.length===0}
          style={{background:navHistory.length>0?P.tealPale:P.creamDim,color:navHistory.length>0?P.teal:P.light,border:"1px solid "+(navHistory.length>0?P.teal+"50":P.creamDim),borderRadius:6,padding:"4px 10px",fontSize:12,cursor:navHistory.length>0?"pointer":"default",fontFamily:"Georgia,serif",opacity:navHistory.length>0?1:0.4}}
          title={navHistory.length>0?"Zurück ("+navHistory.length+" Schritte)":"Kein Verlauf"}>
          ← Zurück{navHistory.length>1?" ("+navHistory.length+")":""}
        </button>
        <span style={{color:P.teal,fontSize:16,fontWeight:"bold"}}>🌱 Humus-Kompass</span>
        <span style={{color:P.light,fontSize:11}}>{EPISODES.length} Einträge</span>
        <div style={{display:"flex",gap:5,marginLeft:"auto",alignItems:"center"}}>
          <span style={{color:P.light,fontSize:9,marginRight:2}}>Sitzung:</span>
          <button onClick={exportSession} title="Gesamte Sitzung als JSON exportieren (Werkliste, Zitate, Fragen)"
            style={{background:P.tealPale,color:P.teal,border:"1px solid "+P.teal+"60",borderRadius:6,
              padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>💾 Export</button>
          <button onClick={shareSession} title="Link zum Teilen generieren und kopieren"
            style={{background:P.tealPale,color:P.teal,border:"1px solid "+P.teal+"60",borderRadius:6,
              padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>🔗 Teilen</button>
          <label title="Sitzung aus JSON-Datei importieren" style={{background:P.cream,color:P.mid,
              border:"1px solid "+P.creamDim,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            📥 Import
            <input type="file" accept=".json" style={{display:"none"}}
              onChange={function(e){if(e.target.files[0])importSession(e.target.files[0]);}}/>
          </label>
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",flexWrap:"wrap"}}>{TABS.map(function(t){return(<button key={t[0]} onClick={function(){setTab(t[0]);setNavHistory([]);}} style={{background:"transparent",color:tab===t[0]?P.teal:P.mid,border:"none",borderBottom:"2px solid "+(tab===t[0]?P.teal:"transparent"),padding:"7px 12px",cursor:"pointer",fontSize:11,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>{t[1]}</button>);})}</div>
        <div style={{padding:"4px 8px"}}><FilterModeToggle mode={filterMode} onChange={setFilterMode}/></div>
      </div>
    </div>
    <div style={{padding:"18px 20px"}}>
      {tab==="kompass"&&(<div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:20,alignItems:"start"}}>
        <div style={{minWidth:300,maxWidth:620}}>
          <Compass activeSphere={sphere} activeFelder={felder} activeVennFilter={vennFilter}
            onSphere={function(id){setSphere(function(p){return p===id?null:id;});}}
            onFelder={function(f){setFelder(function(p){return p===f?null:f;});}}
            onVennFilter={function(id){setVennFilter(function(p){return p===id?null:id;});}}
            count={filtered.length}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            {(sphere||felder||vennFilter)?<div style={{color:P.mid,fontSize:11,padding:"4px 8px",background:P.white,borderRadius:4,border:"1px solid "+P.creamDim}}>Linse: {sphere&&<strong style={{color:sc(sphere)}}>{(SPHERES.find(function(s){return s.id===sphere;})||{}).iLabel}</strong>}{sphere&&felder&&" · "}{felder&&<strong style={{color:P.teal}}>{felder}</strong>}{(sphere||felder)&&vennFilter&&" · "}{vennFilter&&<strong style={{color:"#6a50a0"}}>⬡ {vennFilter}</strong>}</div>:<div/>}
            <FilterModeToggle mode={filterMode} onChange={setFilterMode}/>
          </div>
          <div style={{maxHeight:560,overflowY:"auto",paddingRight:4}}>
            {filtered.length===0?<div style={{color:P.light,fontSize:13}}>Keine Einträge.</div>:filtered.map(function(ep){return <EpCard key={epId(ep)} ep={ep} onClick={selToggle} active={selected&&epId(selected)===epId(ep)} bookmarked={merkliste.indexOf(epId(ep))>=0} onBookmark={toggleBookmark}/>;})}</div>
        </div>
        {selected&&<div style={{gridColumn:"1 / -1"}}><DetailPanel ep={selected}
          onClose={function(){setSelected(null);}}
          bookmarked={merkliste.indexOf(epId(selected))>=0} onBookmark={toggleBookmark}
          onNavEp={handleNavEp} onSelect={setSelected}
          position={(function(){var idx2=filtered.findIndex(function(e){return epId(e)===epId(selected);});return idx2>=0?(idx2+1)+" / "+filtered.length:null;})()}
          onPrev={(function(){var idx2=filtered.findIndex(function(e){return epId(e)===epId(selected);});return idx2>0?function(){setSelected(filtered[idx2-1]);}:null;})()}
          onNext={(function(){var idx2=filtered.findIndex(function(e){return epId(e)===epId(selected);});return idx2<filtered.length-1?function(){setSelected(filtered[idx2+1]);}:null;})()}
        /></div>}
      </div>
    )}
      {tab==="graph"&&<GraphTabs
        eps={EPISODES}
        selected={selected}
        merkliste={merkliste}
        multiSel={multiSel}
        resetKey={resetKey}
        onSelect={function(ep,shiftKey){
          if(shiftKey){var id=epId(ep);setMultiSel(function(prev){return prev.indexOf(id)>=0?prev.filter(function(x){return x!==id;}):prev.concat([id]);});}
          else{setMultiSel([]);selToggle(ep);}
        }}
        onClearMulti={function(){setMultiSel([]);}}
        onNavEp={handleNavEp}
        onBookmark={toggleBookmark}
      />}
      {tab==="suche"&&<SmartSearch
        merkliste={merkliste} onBookmark={toggleBookmark}
        filterMode={filterMode} onFilterMode={setFilterMode}
        onNavEp={handleNavEp}
      />}
      {tab==="ki"&&<AIKompass
        merkliste={merkliste} onBookmark={toggleBookmark}
        onNavEp={handleNavEp}
        onSave={function(d){setDiscoveries(function(p){return p.concat([d]);});}}
      />}
      {tab==="smartsuche"&&<SmartSearch
        merkliste={merkliste} onBookmark={toggleBookmark}
        filterMode={filterMode} onFilterMode={setFilterMode}
        onNavEp={handleNavEp}
      />}
      {tab==="volltextsuche"&&<VolltextSuche
        transcripts={transcripts} loading={transcriptsLoading}
        onLoad={loadTranscripts}
        onNavEp={handleNavEp}
        onSaveZitat={saveZitat}
      />}
      {tab==="personen"&&<Personen onNavEp={handleNavEp}/>
      }{tab==="glossar"&&<Glossar onNavEp={handleNavEp}/>
      }{tab==="merkliste"&&<Merkliste merkliste={merkliste} zitate={zitate} onRemoveZitat={removeZitat} discoveries={discoveries} onRemoveEp={function(id){setMerkliste(function(p){return p.filter(function(x){return x!==id;});});}} onRemoveDisc={function(id){setDiscoveries(function(p){return p.filter(function(d){return d.id!==id;});});}} onShare={shareDiscovery} onNavEp={handleNavEp}/>
      }{tab==="community"&&<Gemeinschaft pins={pins} onNavEp={handleNavEp}/>}
    </div>
  </div>);
}

const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(<App />);
</script>
